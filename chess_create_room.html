<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Master - Arena Created</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #000;
            --accent: #fff;
            --secondary: #222;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--accent);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bg-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.9)),
                url('https://www.transparenttextures.com/patterns/dark-marble.png'),
                #050505;
            z-index: 0;
        }

        .grand-lobby-shell {
            z-index: 10;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 10, 10, 0.4);
            border: none;
            border-radius: 0;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 30px;
            animation: fadeIn 1s ease-out;
            position: relative;
            overflow: hidden;
        }

        /* Header Styles */
        .grand-header {
            background: #111;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            box-sizing: border-box;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 33%;
        }

        .chess-icon {
            font-size: 20px;
            color: #d4af37;
            filter: drop-shadow(0 0 5px #d4af37);
        }

        .header-text-group {
            display: flex;
            flex-direction: column;
        }

        .room-label {
            font-size: 11px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
        }

        .match-info {
            font-size: 9px;
            color: #666;
            font-weight: 800;
        }

        .arena-id-display {
            background: #151515;
            border: none;
            padding: 4px 15px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 950;
            color: #fff;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            font-family: 'Outfit', sans-serif;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
            width: 33%;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            background: #181818;
            border: 1px solid #333;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .header-btn:hover {
            background: #222;
        }

        .header-btn.mic {
            border-color: #ff0066;
            background: rgba(255, 0, 102, 0.05);
        }

        .exit-btn {
            background: #181818;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 5px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .exit-btn:hover {
            background: #b30000;
            border-color: #ff4d4d;
        }

        .exit-txt {
            font-size: 9px;
            font-weight: 900;
            color: #fff;
            text-align: left;
            line-height: 1.1;
            letter-spacing: 1px;
        }

        /* Matchup Area */
        .arena-matchup {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-grow: 1;
            padding: 20px 0;
        }

        .premium-card {
            width: 380px;
            height: 120px;
            background: #080808;
            border: none;
            border-radius: 25px;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            transition: 0.4s;
        }

        .premium-card.dashed {
            border: 2px dashed #1a1a1a;
            background: none;
        }

        .card-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .player-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
        }

        .player-main .name {
            font-size: 24px;
            font-weight: 950;
            color: #fff;
            letter-spacing: 2px;
        }

        .player-main .tag {
            font-size: 10px;
            color: #666;
            font-weight: 900;
        }

        .card-footer {
            background: #111;
            border-radius: 15px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .elo-box {
            display: flex;
            flex-direction: column;
        }

        .elo-val {
            font-size: 15px;
            font-weight: 950;
            color: #d4af37;
        }

        .elo-rank {
            font-size: 10px;
            color: #666;
            font-weight: 800;
        }

        .ping-display {
            font-size: 12px;
            font-weight: 900;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .trophy-vs {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transform: scale(0.85);
        }

        .trophy-top {
            font-size: 60px;
            font-weight: 950;
            color: #fff;
            text-shadow: 0 0 20px #fff;
        }

        .trophy-base {
            font-size: 60px;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
        }

        .waiting-slot {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .waiting-label {
            font-size: 28px;
            font-weight: 950;
            letter-spacing: 10px;
            color: #fff;
            text-shadow: 0 0 20px #fff;
            display: flex;
            align-items: center;
        }

        .dot {
            opacity: 0;
            display: inline-block;
            width: 12px;
            text-align: center;
            letter-spacing: normal;
        }

        .dot:nth-child(1) {
            opacity: 1;
            /* Fixed base dot */
        }

        .dot:nth-child(2) {
            animation: accumulateDot2 1.8s infinite;
        }

        .dot:nth-child(3) {
            animation: accumulateDot3 1.8s infinite;
        }

        @keyframes accumulateDot2 {
            0%, 33.3% { opacity: 0; }
            33.4%, 100% { opacity: 1; }
        }

        @keyframes accumulateDot3 {
            0%, 66.6% { opacity: 0; }
            66.7%, 100% { opacity: 1; }
        }

        /* Footer Re-aligned to Corner Symmetry */
        .grand-footer {
            display: contents;
        }

        .invite-friends-btn {
            position: fixed;
            bottom: 30px;
            left: 50px;
            width: 180px;
            height: 45px;
            background: #000;
            border: none;
            border-radius: 15px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 15px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .invite-friends-btn:hover {
            background: #111;
            border-color: #555;
        }

        .pawn-plus {
            font-size: 11px;
            color: #888;
            flex-shrink: 0;
        }

        .btn-lbl {
            text-align: left;
            font-size: 8px;
            font-weight: 950;
            line-height: 1.2;
            letter-spacing: 1px;
        }

        .message-lobby-btn {
            position: fixed;
            bottom: 30px;
            left: 240px;
            width: 55px;
            height: 45px;
            background: #000;
            border: none;
            border-radius: 15px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            font-size: 18px;
            opacity: 0.3;
            pointer-events: none;
        }

        .message-lobby-btn.enabled {
            opacity: 1;
            pointer-events: all;
        }

        .message-lobby-btn:hover {
            background: #111;
            border-color: #555;
            transform: translateY(-2px);
        }

        .notification-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            background: #ff3333;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
            display: none;
            animation: pulseDot 2s infinite;
        }

        @keyframes pulseDot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.1);
            }
        }

        /* Tactical Chat Sidebar */
        #lobby-chat-sidebar {
            position: fixed;
            top: 100px;
            left: -350px;
            width: 320px;
            height: calc(100% - 220px);
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(25px);
            border: none;
            border-radius: 0 25px 25px 0;
            z-index: 2000;
            transition: left 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.8);
        }

        #lobby-chat-sidebar.open {
            left: 0;
        }

        .chat-header {
            padding: 20px;
            border-bottom: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #555;
            text-transform: uppercase;
        }

        .chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 11px;
            line-height: 1.5;
            position: relative;
            animation: msgFadeUp 0.3s ease;
        }

        .chat-msg.received {
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .chat-msg.sent {
            background: #fff;
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            font-weight: 700;
        }

        .msg-meta {
            font-size: 8px;
            margin-top: 5px;
            opacity: 0.5;
            display: block;
            text-align: right;
        }

        .chat-input-area {
            padding: 15px;
            border-top: none;
            display: flex;
            gap: 10px;
            position: relative;
        }

        .lobby-chat-input {
            flex: 1;
            background: #111;
            border: none;
            border-radius: 12px;
            padding: 10px 45px 10px 15px;
            color: #fff;
            font-size: 11px;
            outline: none;
            transition: 0.3s;
        }

        .lobby-chat-input:focus {
            border-color: #666;
        }

        .emoji-trigger-btn {
            position: absolute;
            right: 45px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            opacity: 0.5;
            transition: 0.3s;
            z-index: 5;
        }

        .emoji-trigger-btn:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
        }

        .lobby-emoji-picker {
            position: absolute;
            bottom: 75px;
            right: 15px;
            width: 280px;
            height: 250px;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(25px);
            border: none;
            border-radius: 20px;
            padding: 10px;
            display: none;
            flex-direction: column;
            z-index: 3000;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        .lobby-emoji-picker.open {
            display: flex;
        }

        .picker-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 5px;
            padding: 5px;
            border-bottom: 1px solid #1a1a1a;
            position: sticky;
            top: 0;
            background: inherit;
            z-index: 10;
        }

        .close-picker-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        .close-picker-btn:hover {
            color: #fff;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            overflow-y: auto;
            padding: 10px;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }

        .emoji-item {
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .emoji-item:hover {
            transform: scale(1.3);
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
        }

        .chat-send-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .chat-send-btn:hover {
            transform: scale(1.1);
        }

        /* Digital Voice Transcription Overlay */
        #voice-transcription-overlay {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: fit-content;
            max-width: 600px;
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid rgba(255, 51, 51, 0.3);
            border-radius: 20px;
            padding: 15px 30px;
            color: #ff3333;
            font-size: 14px;
            font-weight: 950;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
            display: none;
            z-index: 5000;
            backdrop-filter: blur(15px);
            text-transform: uppercase;
            animation: fadeUp 0.3s ease;
        }

        .transcription-name { color: #fff; margin-right: 10px; opacity: 0.6; font-size: 10px; }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }


        /* Premium Arena Modal System */
        #custom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(25px) saturate(180%);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5000;
            animation: fadeIn 0.4s ease;
        }

        .custom-modal {
            background: linear-gradient(145deg, #0f0f0f, #050505);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 60px;
            border-radius: 35px;
            text-align: center;
            width: 450px;
            box-shadow:
                0 50px 100px rgba(0, 0, 0, 1),
                inset 0 1px 1px rgba(255, 255, 255, 0.1),
                0 0 50px rgba(255, 255, 255, 0.03);
            animation: modalPopUp 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }

        .custom-modal::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
            animation: modalGlowPulse 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes modalPopUp {
            from {
                transform: scale(0.9) translateY(40px);
                opacity: 0;
            }

            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        @keyframes modalGlowPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.3;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.6;
            }
        }

        .modal-title {
            color: #444;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .modal-text {
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            line-height: 1.8;
            margin-bottom: 45px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .modal-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .modal-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px 45px;
            border-radius: 50px;
            font-weight: 900;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            font-size: 11px;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .modal-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.4);
        }

        .modal-btn.secondary {
            background: #000;
            color: #555;
            border: 1px solid #222;
        }

        .modal-btn.secondary:hover {
            color: #fff;
            border-color: #555;
            background: #111;
        }

        .bet-status-display {
            position: fixed;
            bottom: 45px;
            right: 268px;
            font-size: 8px;
            color: #ff3333;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.4);
            display: none;
            opacity: 0;
            transition: 0.5s;
            z-index: 100;
            white-space: nowrap;
        }

        .bet-status-display.activated {
            display: block;
            opacity: 1;
        }



        .kickstart-btn {
            position: fixed;
            bottom: 30px;
            right: 50px;
            width: 200px;
            height: 55px;
            background: #252525;
            border: none;
            border-radius: 15px;
            color: #444;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: not-allowed;
            z-index: 100;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .kickstart-btn.active {
            background: #fff;
            color: #000;
            cursor: pointer;
            border-color: #fff;
        }

        .kickstart-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .reminder-btn {
            position: fixed;
            bottom: 30px;
            right: 270px;
            width: 160px;
            height: 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: #888;
            display: none;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .reminder-btn:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .footer-status {
            background: #111;
            border-radius: 20px;
            padding: 0 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 350px;
            flex-shrink: 0;
        }

        .status-main {
            font-size: 14px;
            font-weight: 950;
            color: #fff;
            letter-spacing: 2px;
        }

        .status-sub {
            font-size: 9px;
            color: #666;
            font-weight: 800;
        }

        .leave-room-btn-participant {
            background: rgba(255, 60, 60, 0.05);
            border: none;
            border-radius: 15px;
            color: #ff4d4d;
            height: 55px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 950;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            margin-left: 10px;
        }

        .leave-room-btn-participant:hover {
            background: rgba(255, 60, 60, 0.15);
            border-color: #ff4d4d;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>
    <div id="voice-transcription-overlay">
        <span class="transcription-name">OPERATIVE VOICE:</span>
        <span id="transcription-text">TRANSMITTING...</span>
    </div>

    <!-- Main Lobby Terminal -->

    <div class="grand-lobby-shell">
        <!-- Top Bar -->
        <div class="grand-header">
            <div class="header-left">
                <div class="header-text-group">
                    <span class="room-label">ROOM: PRIVATE LOBBY</span>
                </div>
            </div>
            <div class="arena-id-display">ROOM ID: 7842</div>
            <div class="header-controls">
                <div class="header-btn" id="bet-btn" onclick="openBetMenu()" title="BET MATCH" style="position: relative;">
                    💰
                    <div id="bet-notification-dot" class="notification-dot" style="background: #39FF14; display: none; position: absolute; top: 0; right: 0;"></div>
                </div>
                <div class="header-btn" id="share-btn" onclick="shareArenaLink()" title="COPY LINK">🔗</div>
                <div class="header-btn" id="bet-inbox-btn" onclick="openBetMenu()" title="BET REQUESTS" style="position: relative; display: none;">
                    📩
                    <div id="inbox-notification-dot" class="notification-dot" style="background: #ff0066; display: none; position: absolute; top: 0; right: 0;"></div>
                </div>
                <div class="header-btn" id="record-btn" onclick="toggleRecording()" title="RECORD MATCH">⏺️</div>
                <div class="header-btn mic" id="mic-btn" onclick="toggleMic()" title="TOGGLE VOICE LINK"><span
                        class="mic-icon">🎙️</span><span class="mic-toggle">×</span></div>
                <button class="exit-btn" id="exit-room-btn" onclick="exitToArena()">
                    <span class="exit-icon">🏰</span>
                    <div class="exit-txt">CLOSE<br>ROOM</div>
                </button>
            </div>
        </div>

        <!-- Players Area -->
        <div class="arena-matchup">
            <!-- Your Card -->
            <div class="premium-card player-self">
                <div class="card-inner">
                    <div class="player-main">
                        <span class="name">QWE</span>
                        <span class="tag">(YOU)</span>
                    </div>
                </div>
            </div>

            <!-- Trophy Matchup Icon -->
            <div class="trophy-vs">
                <span class="trophy-top">⚔️</span>
            </div>

            <!-- Waiting Card -->
            <div class="premium-card waiting-slot dashed">
                <div class="cinematic-bg"></div>
                <div class="waiting-layer">
                    <div class="waiting-label">WAITING<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
                    <div class="loading-ring"></div>
                </div>
            </div>
        </div>

        <div class="grand-footer">
            <button class="invite-friends-btn" onclick="window.location.href='chess_friends.html'">
                <span class="pawn-plus">♟️+</span>
                <span class="btn-lbl">INVITE FROM<br>FRIENDS LIST</span>
            </button>

            <button class="message-lobby-btn" id="lobby-msg-btn" onclick="toggleLobbyChat()" title="TOGGLE CHEST CHAT">
                💬
                <div id="chat-notification-dot" class="notification-dot"></div>
            </button>

            <button class="leave-room-btn-participant" id="leave-room-btn-p" onclick="confirmLeaveRoom()"
                style="display:none;" title="SIGNAL DISCONNECT">
                <span>🏠</span>
                <span class="btn-lbl">LEAVE<br>ROOM</span>
            </button>

            <span id="bet-status-display" class="bet-status-display" style="margin-left:auto;"></span>


            <button class="kickstart-btn" id="kickstart-btn" onclick="openBettingPanel()"
                title="SECURE WAGER MANAGEMENT">
                💰
                <span class="btn-lbl">BET MATCH<br>FUNDS</span>
            </button>

            <button class="reminder-btn" id="reminder-btn" onclick="sendHostReminder()">
                <span class="bell-icon">🔔</span>
                <span class="rem-txt">REMIND HOST</span>
            </button>

            <button class="kickstart-btn disabled" id="kickstart-btn">
                <span class="pawn-icon">🏰</span>
                <span class="kick-txt">START MATCH</span>
            </button>
        </div>
    </div>

    <!-- Tactical Chat Sidebar -->
    <div id="lobby-chat-sidebar">
        <div class="chat-header">
            <div style="display:flex; flex-direction:column; gap:2px;">
                <div id="chat-opponent-display"
                    style="font-size:11px; color:#00ffcc; font-weight:900; letter-spacing:2px; opacity:1.0; text-shadow: 0 0 8px rgba(0, 255, 204, 0.4);">
                    SCANNING FOR UPLINK...</div>
            </div>
            <button onclick="toggleLobbyChat()"
                style="background:none; border:none; color:#444; cursor:pointer; font-size:18px;">&times;</button>
        </div>
        <div class="chat-history" id="chat-history">
            <!-- Tactical messages will populate here in real-time -->
        </div>
        <div class="chat-input-area">
            <div id="lobby-emoji-picker" class="lobby-emoji-picker">
                <div class="picker-header">
                    <button class="close-picker-btn" onclick="toggleEmojiPicker()">&times;</button>
                </div>
                <div id="emoji-grid" class="emoji-grid">
                    <!-- Emojis will be generated by JS -->
                </div>
            </div>
            <input type="text" class="lobby-chat-input" id="lobby-chat-input" placeholder="TYPE A MESSAGE"
                onkeypress="if(event.key === 'Enter') sendLobbyMessage()">
            <button class="emoji-trigger-btn" onclick="toggleEmojiPicker()">😀</button>
            <button class="chat-send-btn" onclick="sendLobbyMessage()">➤</button>
        </div>
    </div>

    <!-- Premium Arena Modal -->
    <div id="custom-modal-overlay">
        <div class="custom-modal">
            <div class="modal-title" id="modal-title-tag">SYSTEM NOTICE</div>
            <div class="modal-text" id="modal-content">ARENA NOTIFICATION</div>
            <div class="modal-controls">
                <button class="modal-btn secondary" id="modal-secondary-btn" style="display:none;">CANCEL</button>
                <button class="modal-btn" id="modal-primary-btn">PROCEED</button>
            </div>
        </div>
    </div>

    <script>
        function openModal(msg, primaryText = "PROCEED", primaryAction = closeModal, showSecondary = false, secondaryText = "CANCEL", secondaryAction = closeModal, title = "SYSTEM NOTICE", showPrimary = true) {
            const content = document.getElementById('modal-content');
            const titleTag = document.getElementById('modal-title-tag');
            const pBtn = document.getElementById('modal-primary-btn');
            const sBtn = document.getElementById('modal-secondary-btn');

            titleTag.innerText = title;
            content.style.display = 'block';
            content.innerHTML = msg;

            if (showPrimary) {
                pBtn.style.display = 'block';
                pBtn.innerText = primaryText;
                pBtn.onclick = () => { primaryAction(); };
            } else {
                pBtn.style.display = 'none';
            }

            if (showSecondary) {
                sBtn.style.display = 'block';
                sBtn.innerText = secondaryText;
                sBtn.onclick = () => { secondaryAction(); };
            } else {
                sBtn.style.display = 'none';
            }

            document.getElementById('custom-modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('custom-modal-overlay').style.display = 'none';
        }

        function confirmStartMatch() {
            openModal(
                "CONFIRM: DO YOU WANT TO START THE MATCH?",
                "1. START",
                () => {
                    if (isMusicPlaying) bgMusic.pause();
                    window.location.href = 'chess.html';
                },
                true,
                "2. CANCEL"
            );
        }

        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('id') || "7842";
        const role = urlParams.get('role') || "host";
        document.querySelector('.arena-id-display').textContent = "ROOM ID: " + roomId;

        // Socket Multiplayer Initialization
        const socket = io();
        const myName = localStorage.getItem('playerName') || "OPERATIVE_X";

        socket.on('connect_error', (err) => {
            console.error("Connection error:", err);
            openModal("SERVER CONNECTION FAILED.<br><br>1. Check if the server is running.<br>2. Use the Host's IP (e.g., http://192.168.x.x:3001).<br>3. Turn off your Firewall.", "RETRY", () => window.location.reload(), false, "EXIT", () => window.location.href='chess_online.html', "NETWORK ERROR");
        });

        socket.on('connect', () => {
            console.log("Connected to server");
            socket.emit('join_room', {
                roomId: roomId,
                playerName: myName,
                isCreating: role === 'host'
            });
        });

        function updateRoleSystem() {
            const ksBtn = document.getElementById('kickstart-btn');
            const rBtn = document.getElementById('reminder-btn');

            if (role === 'participant') {
                ksBtn.classList.add('disabled');
                ksBtn.style.cursor = 'not-allowed';
                ksBtn.title = "ONLY HOST CAN START";
                rBtn.style.display = 'flex';

                // Hide Host-Only Controls
                document.getElementById('bet-btn').style.display = 'none';
                document.getElementById('share-btn').style.display = 'none';
                document.getElementById('record-btn').style.display = 'none';
                document.getElementById('exit-room-btn').style.display = 'none';

                // Allow participants to chat immediately (since their presence = 2 players)
                const lobbyMsgBtn = document.getElementById('lobby-msg-btn');
                lobbyMsgBtn.classList.add('enabled');
                lobbyMsgBtn.title = "OPEN TACTICAL CHAT";

                // Remove invite button for participants (they are the ones being invited)
                document.querySelector('.invite-friends-btn').style.display = 'none';

                // Show Participant Exit
                document.getElementById('leave-room-btn-p').style.display = 'flex';
            } else {
                rBtn.style.display = 'none';
            }
        }

        updateRoleSystem();

        function sendHostReminder() {
            openModal(
                "MESSAGE SENT TO HOST VIA ARENA LINK",
                "CLOSE",
                () => { },
                true,
                "REPLY",
                () => {
                    openModal("ENVIRONMENT MESSAGE RECEIVED:\n\n'EVERYONE READY LETS BEGIN THE MATCH'");
                },
                "ARENA REMINDER"
            );
        }

        async function shareArenaLink() {
            const shareText = `CHALLENGE REQUEST: Join my private Grandmaster Chess Arena! Access Key: ${roomId}`;
            const shareUrl = window.location.origin + `/chess_online.html?join=${roomId}`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Chess Master Invitation',
                        text: shareText,
                        url: shareUrl,
                    });
                } catch (err) { }
            } else {
                try {
                    await navigator.clipboard.writeText(`${shareText}\n${shareUrl}`);
                    openModal("ARENA LINK COPIED TO CLIPBOARD!\n\nPASTE IT IN WHATSAPP OR MESSAGES TO CHALLENGE A FRIEND.");
                } catch (err) { }
            }
        }

        // Automatic Join Simulation for Recruited Friends
        window.addEventListener('load', () => {
            if (localStorage.getItem('chess_invite_sent') === 'true') {
                const kickstartBtn = document.querySelector('.kickstart-btn');
                const opponentCard = document.querySelector('.waiting-slot');

                setTimeout(() => {
                    // Update Opponent Card to Grandmaster MAGNUS_V
                    opponentCard.classList.remove('dashed');
                    opponentCard.innerHTML = `
                        <div class="card-inner">
                            <div class="player-main">
                                <span class="name" style="color: #d4af37;">MAGNUS_V</span>
                                <span class="tag">(CHALLENGER)</span>
                            </div>
                        </div>
                    `;

                    // Enable Kickstart
                    kickstartBtn.classList.remove('disabled');
                    kickstartBtn.classList.add('active');
                    kickstartBtn.innerHTML = `<span class="kick-icon">⚔️</span><span class="kick-txt">START MATCH</span>`;

                    // Force re-binding for total reliability
                    kickstartBtn.onclick = (e) => {
                        e.preventDefault();
                        confirmStartMatch();
                    };

                    // Clear invitation flag
                    localStorage.removeItem('chess_invite_sent');

                    openModal("INVITATION ACCEPTED!\n\nMAGNUS_V HAS ENTERED THE GRAND ARENA.");

                    // Reveal Tactical Chat for the recruited challenger
                    enableChatHub("MAGNUS_V");

                }, 2500);
            }
        });
        let isRecording = false;
        function toggleRecording() {
            if (role === 'host' && !isRecording) {
                // Host wants to start recording
                // Check if p2 exists
                if (!document.querySelector('.kickstart-btn').classList.contains('active')) {
                    openModal("ERROR: NO REAL PLAYER DETECTED.\n\nRECORDING MODULE IS ONLY ACTIVE FOR ONLINE COMPETITORS.");
                    return;
                }

                openModal("WAITING FOR YOUR FRIEND APPROVAL...", "PROCEED", null, false, "CANCEL", null, "SYSTEM NOTICE", false);
                socket.emit('request_record', { roomId: roomId });
                return;
            }

            // For stopping recording, or for participant who was told to start
            forceToggleRecording();
        }

        function forceToggleRecording() {
            const btn = document.getElementById('record-btn');
            if (!isRecording) {
                isRecording = true;
                btn.innerHTML = "🔴";
                btn.style.borderColor = "#ff4d4d";
                btn.style.boxShadow = "0 0 10px rgba(255, 77, 77, 0.3)";
                if (role === 'host') openModal("ARENA CAPTURE SESSION INITIALIZED.\n\nRECORDING MULTIPLAYER LOGS TO ARCHIVE.");
            } else {
                isRecording = false;
                btn.innerHTML = "⏺️";
                btn.style.borderColor = "#333";
                btn.style.boxShadow = "none";
                openModal("RECORDING STOPPED.\n\nMATCH TELEMETRY HAS BEEN SAVED TO LOCAL CACHE.");
            }
        }

        socket.on('record_requested_by_host', () => {
            openModal(
                "YOUR FRIEND WANT TO RECORD THE MATCH",
                "1. YES",
                () => {
                    socket.emit('accept_record', { roomId: roomId });
                    forceToggleRecording();
                },
                true,
                "2. NO",
                () => {
                    socket.emit('decline_record', { roomId: roomId });
                }
            );
        });

        socket.on('record_accepted_by_friend', () => {
            openModal("YOU FRIEND ACCEPT TO RECORD THE MATCH");
            forceToggleRecording();
        });

        socket.on('record_declined_by_friend', () => {
            openModal("YOUR FRIEND DECLINE TO RECORD THE MATCH");
        });
        let recognition;
        let isMicOn = false;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    }
                }
                if (finalTranscript) {
                    socket.emit('voice_transcription', {
                        roomId: roomId,
                        text: finalTranscript,
                        playerName: myName
                    });
                    showMyTranscription(finalTranscript);
                }
            };
        }

        function showMyTranscription(text) {
            const overlay = document.getElementById('voice-transcription-overlay');
            const textSpan = document.getElementById('transcription-text');
            const nameSpan = overlay.querySelector('.transcription-name');
            
            nameSpan.innerText = "YOU:";
            textSpan.innerText = text;
            overlay.style.display = 'block';
            
            clearTimeout(window.voiceTimer);
            window.voiceTimer = setTimeout(() => {
                overlay.style.display = 'none';
            }, 3000);
        }

        socket.on('receive_transcription', (data) => {
            const overlay = document.getElementById('voice-transcription-overlay');
            const textSpan = document.getElementById('transcription-text');
            const nameSpan = overlay.querySelector('.transcription-name');
            
            nameSpan.innerText = `${data.playerName.toUpperCase()}:`;
            textSpan.innerText = data.text;
            overlay.style.display = 'block';
            
            clearTimeout(window.voiceTimer);
            window.voiceTimer = setTimeout(() => {
                overlay.style.display = 'none';
            }, 3000);
        });

        async function toggleMic() {
            const btn = document.getElementById('mic-btn');
            const micToggle = btn.querySelector('.mic-toggle');

            if (!isMicOn) {
                try {
                    // Request high-fidelity audio with noise suppression
                    await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        } 
                    });
                    
                    isMicOn = true;
                    if (recognition) recognition.start();
                    
                    micToggle.style.display = 'none';
                    btn.style.borderColor = "#00ffcc";
                    btn.style.background = "rgba(0, 255, 204, 0.05)";
                    openModal("VOICE LINK INITIALIZED.\n\nSPEECH-TO-TEXT MODULE IS ACTIVE. COMMUNICATE FREELY.");
                } catch (err) {
                    openModal("COMMUNICATION ERROR:\n\nMICROPHONE ACCESS WAS DENIED BY SYSTEM.");
                }
            } else {
                isMicOn = false;
                if (recognition) recognition.stop();
                
                micToggle.style.display = 'inline';
                btn.style.borderColor = "#ff0066";
                btn.style.background = "rgba(255, 0, 102, 0.05)";
                openModal("VOICE LINK TERMINATED.\n\nMICROPHONE AND CAPTIONING SYSTEM DEACTIVATED.");
            }
        }
        // Real-Time Betting & Wallet Sync
        let userWallet = parseInt(localStorage.getItem('playerMoney') || '900');
        
        // Listeners for Betting
        let pendingBetAmount = 0;
        socket.on('bet_requested_by_friend', (data) => {
            const { amount } = data;
            pendingBetAmount = amount;
            
            // Show notification dot on inbox
            const inboxDot = document.getElementById('inbox-notification-dot');
            if (inboxDot) inboxDot.style.display = 'block';

            showArenaModal(`YOUR FRIEND WANTS TO PLAY A BET MATCH! CLICK THE 📩 ICON TO RESPOND.`);
        });

        function showBetAcceptanceModal(amount) {
            openModal(
                `BET REQUEST: ${opponentName || 'FRIEND'} WANTS TO PLAY FOR $${amount}.\n\nDO YOU ACCEPT?`,
                "ACCEPT",
                () => {
                    socket.emit('bet_response', { roomId, accepted: true, amount });
                    askForSplit(amount);
                    document.getElementById('inbox-notification-dot').style.display = 'none';
                    pendingBetAmount = 0;
                },
                true,
                "DECLINE",
                () => {
                    socket.emit('bet_response', { roomId, accepted: false, amount });
                    closeModal();
                    document.getElementById('inbox-notification-dot').style.display = 'none';
                    pendingBetAmount = 0;
                },
                "INCOMING BET"
            );
        }

        socket.on('bet_response_received', (data) => {
            const { accepted, amount } = data;
            if (accepted) {
                openModal(`YOUR FRIEND ACCEPT YOUR BET MATCH $${amount}`, "PROCEED", () => askForSplit(amount));
            } else {
                openModal(`YOUR FRIEND DECLINED THE BET MATCH.`);
            }
        });

        socket.on('bet_split_sync', (data) => {
            const { amount } = data;
            const splitVal = amount / 2;
            userWallet -= splitVal;
            localStorage.setItem('playerMoney', userWallet);
            
            const status = document.getElementById('bet-status-display');
            if (status) {
                status.textContent = `BET MATCH ACTIVATED: $${amount}`;
                status.classList.add('activated');
            }
            openModal(`TRANSACTION COMPLETE.\n\n$${splitVal} DEBITED FROM YOUR WALLET.\nREMAINING BALANCE: $${userWallet}`, "PROCEED", closeModal, false, "CANCEL", null, "FUNDS SECURED");
        });

        function openBetMenu() {
            // If participant and has pending bet, show acceptance
            if (role !== 'host' && pendingBetAmount > 0) {
                showBetAcceptanceModal(pendingBetAmount);
                return;
            }

            // Normal menu logic
            const betDot = document.getElementById('bet-notification-dot');
            if (betDot) betDot.style.display = 'none';

            if (!document.querySelector('.kickstart-btn').classList.contains('active')) {
                openModal("ERROR: NO REAL PLAYER DETECTED.\n\nWAGER MODULE IS ONLY ACTIVE FOR ONLINE COMPETITORS.");
                return;
            }

            const betHTML = `
                <div style="font-size: 11px; letter-spacing: 2px; color: #888; margin-bottom: 20px;">SELECT STAKE AMOUNT</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                    <button class="modal-btn" style="margin:0; font-size:12px;" onclick="confirmBetRequest(200)">$200</button>
                    <button class="modal-btn" style="margin:0; font-size:12px;" onclick="confirmBetRequest(400)">$400</button>
                    <button class="modal-btn" style="margin:0; font-size:12px;" onclick="confirmBetRequest(600)">$600</button>
                </div>
            `;

            document.getElementById('modal-content').innerHTML = betHTML;
            document.getElementById('modal-primary-btn').style.display = 'none';
            document.getElementById('modal-secondary-btn').style.display = 'block';
            document.getElementById('modal-secondary-btn').innerText = "CANCEL";
            document.getElementById('modal-secondary-btn').onclick = closeModal;
            document.getElementById('custom-modal-overlay').style.display = 'flex';
        }

        function confirmBetRequest(amt) {
            if (userWallet < amt / 2) {
                openModal(`INSUFFICIENT FUNDS.\n\nYOU NEED AT LEAST $${amt/2} FOR EQUAL SPLIT BUT HAVE $${userWallet}.`, "PROCEED", closeModal, false, "CANCEL", null, "BALANCE ERROR");
                return;
            }

            openModal(
                `SENT BET REQUEST "$${amt}" TO YOUR FRIEND?`,
                "YES, SEND",
                () => {
                    openModal(`SENDING REQUEST TO FRIEND...\nWAITING FOR APPROVAL...`, "WAITING", null, false, "", null, "TRANSMITTING", false);
                    socket.emit('bet_request', { roomId, amount: amt });
                },
                true,
                "NO, CANCEL"
            );
        }

        function askForSplit(amt) {
            openModal(
                `STAKE ACCEPTED. INITIALIZE EQUAL FUND SPLIT?\n\n($${amt/2} FROM EACH OPERATIVE)`,
                "YES, SPLIT",
                () => executeSplit(amt),
                true,
                "NO, CANCEL"
            );
        }

        function executeSplit(amt) {
            let countdown = 3;
            const splitVal = amt / 2;

            function updateTimer() {
                if (countdown > 0) {
                    openModal(`RECALCULATING BALANCES... PLEASE WAIT\n\nUNCRYPTING LEDGER: ${countdown}s`, "PROCESSING...", () => { }, false);
                    countdown--;
                    setTimeout(updateTimer, 1000);
                } else {
                    userWallet -= splitVal;
                    localStorage.setItem('playerMoney', userWallet);
                    
                    socket.emit('bet_split_executed', { roomId, amount: amt });

                    const status = document.getElementById('bet-status-display');
                    if (status) {
                        status.textContent = `BET MATCH ACTIVATED: $${amt}`;
                        status.classList.add('activated');
                    }
                    openModal(`AMOUNT SPLIT SUCCESSFULLY.\n\n$${splitVal} TAKEN FROM YOUR WALLET.\nREMAINING WALLET: $${userWallet}`);
                }
            }
            updateTimer();
        }

        function handleSplitAmount() {
            // Requirement was specifically for any number selection, 
            // but clicking the main Split Amount button will trigger a baseline 100 split
            askForSplit(200);
        }

        // Initialize UI based on role
        if (role === 'host') {
            document.getElementById('display-room-id').textContent = `ROOM ID: ${roomId}`;
            document.getElementById('arena-id-title').textContent = `ARENA ID: ${roomId}`;
        } else {
            document.getElementById('display-room-id').textContent = `ROOM ID: ${roomId}`;
            document.getElementById('arena-id-title').textContent = `ARENA ID: ${roomId}`;
            document.getElementById('bet-inbox-btn').style.display = 'flex';
        }

        function exitToArena() {
            if (role === 'host') {
                socket.emit('close_room', { roomId: roomId });
            }

            if (window.parent && window.parent !== window) {
                window.parent.postMessage('closePortal', '*');
            } else {
                window.location.href = 'chess.html';
            }
        }

        function confirmLeaveRoom() {
            openModal(
                "ARE YOU SURE YOU WANT TO LEAVE THE ARENA?",
                "CONFIRM EXIT",
                () => {
                    exitToArena();
                },
                true,
                "CANCEL",
                closeModal,
                "TACTICAL DISCONNECT"
            );
        }

        let chatInitialized = false;
        function toggleLobbyChat() {
            const sidebar = document.getElementById('lobby-chat-sidebar');
            sidebar.classList.toggle('open');

            if (sidebar.classList.contains('open')) {
                // Clear notification on open
                document.getElementById('chat-notification-dot').style.display = 'none';
                chatInitialized = true;
            }
        }

        function appendChatMessage(name, text, time, isMe, isSystem = false) {
            const history = document.getElementById('chat-history');
            const msg = document.createElement('div');

            if (isSystem) {
                msg.className = 'chat-msg received';
                msg.style.background = 'rgba(0, 255, 204, 0.03)';
                msg.style.borderColor = 'rgba(0, 255, 204, 0.1)';
                msg.style.color = '#00ffcc';
                msg.style.border = '1px solid rgba(0, 255, 204, 0.1)';
            } else {
                msg.className = `chat-msg ${isMe ? 'sent' : 'received'}`;
            }

            msg.innerHTML = `
                <div style="font-size:7px; margin-bottom:4px; opacity:0.6;">${name.toUpperCase()}</div>
                ${text.toUpperCase()}
                <span class="msg-meta">${time}</span>
            `;

            history.appendChild(msg);
            history.scrollTop = history.scrollHeight;
        }

        function enableChatHub(opponentName) {
            const status = document.getElementById('chat-opponent-display');
            if (status) {
                status.innerHTML = `CHAT WITH: ${opponentName.toUpperCase()}`;
                status.style.color = "#00ffcc";
                status.style.textShadow = "0 0 8px rgba(0, 255, 204, 0.4)";
            }

            // Enable Comms Button
            const lobbyMsgBtn = document.getElementById('lobby-msg-btn');
            if (lobbyMsgBtn) {
                lobbyMsgBtn.classList.add('enabled');
                lobbyMsgBtn.title = "OPEN TACTICAL CHAT";
            }
        }

        function renderOpponentJoined(opponentName) {
            const opponentCard = document.querySelector('.waiting-slot');
            if (!opponentCard) return;

            opponentCard.classList.remove('dashed', 'waiting-slot');
            opponentCard.classList.add('player-opponent');
            opponentCard.innerHTML = `
                <div class="card-inner">
                    <div class="player-main">
                        <span class="name" style="color: #d4af37;">${opponentName.toUpperCase()}</span>
                        <span class="tag">(CHALLENGER)</span>
                    </div>
                </div>
            `;

            // Enable Kickstart for Host
            if (role === 'host') {
                const kickstartBtn = document.getElementById('kickstart-btn');
                kickstartBtn.classList.remove('disabled');
                kickstartBtn.classList.add('active');
                kickstartBtn.innerHTML = `<span class="kick-icon">⚔️</span><span class="kick-txt">START MATCH</span>`;
                kickstartBtn.onclick = (e) => {
                    e.preventDefault();
                    confirmStartMatch();
                };
            }

            enableChatHub(opponentName);
        }

        function resetOpponentCard() {
            const container = document.querySelector('.arena-matchup');
            // Find the opponent card (the second card)
            const cards = container.querySelectorAll('.premium-card');
            if (cards.length < 2) return;
            
            const opponentCard = cards[1];
            opponentCard.className = 'premium-card waiting-slot dashed';
            opponentCard.innerHTML = `
                <div class="cinematic-bg"></div>
                <div class="waiting-layer">
                    <div class="waiting-label">WAITING<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
                    <div class="loading-ring"></div>
                </div>
            `;

            // Disable Kickstart for Host
            const ksBtn = document.getElementById('kickstart-btn');
            ksBtn.classList.add('disabled');
            ksBtn.classList.remove('active');
            ksBtn.innerHTML = `💰 <span class="btn-lbl">BET MATCH<br>FUNDS</span>`;
            ksBtn.onclick = null;

            // Disable Chat Icon
            const lobbyMsgBtn = document.getElementById('lobby-msg-btn');
            lobbyMsgBtn.classList.remove('enabled');
            lobbyMsgBtn.title = "SCANNING FOR UPLINK...";
            
            const chatStatus = document.getElementById('chat-opponent-display');
            chatStatus.innerHTML = "SCANNING FOR UPLINK...";
            chatStatus.style.color = "#00ffcc";
        }

        socket.on('room_error', (data) => {
            openModal(data.message, "BACK TO LOBBY", () => {
                window.location.href = 'chess_online.html';
            }, false, "CANCEL", null, "JOIN FAILED");
        });

        socket.on('room_full', (data) => {
            openModal(data.message, "BACK TO LOBBY", () => {
                window.location.href = 'chess_online.html';
            }, false, "CANCEL", null, "ROOM FULL");
        });

        socket.on('game_start', () => {
            if (isMusicPlaying) bgMusic.pause();
            window.location.href = `chess.html?id=${roomId}&role=${role}`;
        });

        function confirmStartMatch() {
            openModal(
                "CONFIRM: DO YOU WANT TO START THE MATCH?",
                "1. START",
                () => {
                    socket.emit('player_ready', { roomId: roomId });
                },
                true,
                "2. CANCEL"
            );
        }

        socket.on('player_joined', (data) => {
            if (data.players && data.players.length > 1) {
                const opponent = data.players.find(p => p.id !== socket.id);
                if (opponent) renderOpponentJoined(opponent.name);
            }
        });

        socket.on('player_left', (data) => {
            if (role === 'host') {
                resetOpponentCard();
                openModal("THE PLAYER HAS LEFT THE ROOM.<br><br>THE PLACE WAS VACATED.", "PROCEED", closeModal, false, "CANCEL", null, "SYSTEM NOTICE");
            }
        });

        function sendLobbyMessage() {
            const input = document.getElementById('lobby-chat-input');
            const val = input.value.trim();
            if (val === "") return;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // Optimistic UI: Show my message immediately
            appendChatMessage(myName, val, time, true);

            socket.emit('send_message', {
                roomId: roomId,
                message: val,
                playerName: myName
            });
            input.value = "";
        }

        socket.on('receive_message', (data) => {
            appendChatMessage(data.playerName, data.message, data.time, false);

            // Show notification dot if chat is closed
            const sidebar = document.getElementById('lobby-chat-sidebar');
            if (!sidebar.classList.contains('open')) {
                document.getElementById('chat-notification-dot').style.display = 'block';
            }
        });

        socket.on('room_closed', () => {
            if (role !== 'host') {
                openModal("ROOM HAS BEEN CLOSED BY THE HOST.<br>RETURNING TO LOBBY...", "PROCEED", () => {
                    exitToArena();
                }, false, "CANCEL", null, "COMMUNICATION TERMINATED");

                // Auto redirect after 3 seconds if they don't click
                setTimeout(() => {
                    exitToArena();
                }, 3000);
            }
        });

        // Initialize Emoji Picker
        const emojiList = [
            "😀", "😃", "😄", "😁", "😆", "😅", "😂", "🤣", "😊", "🙂", "🙃", "😉", "😌", "😍", "😘", "😗", "😙", "😚", "😋", "😛", "😝", "😜", "🤪", "🤨", "🧐", "🤓", "😎", "🤩", "🥳",
            "😏", "😒", "😞", "😔", "😟", "😕", "🙁", "☹️", "😣", "😖", "😫", "😩", "🥺", "😢", "😭", "😤", "😠", "😡", "🤬", "😳", "😱", "😨", "😰", "😥", "😓", "🤗", "🤔",
            "🤭", "🤫", "🤥", "😶", "😐", "😑", "😬", "🙄", "😯", "😦", "😧", "😮", "😲", "🥱", "😴", "🤤", "😪", "😵", "🤯", "😵‍💫", "🤠", "🥴", "😷", "🤒", "🤕",
            "👻", "💀", "☠️", "👽", "🤖", "🎃", "😺", "😸", "😹", "😻", "😼", "😽", "🙀", "😿", "😾"
        ];

        const picker = document.getElementById('lobby-emoji-picker');
        const grid = document.getElementById('emoji-grid');
        emojiList.forEach(emoji => {
            const div = document.createElement('div');
            div.className = 'emoji-item';
            div.innerText = emoji;
            div.onclick = () => {
                const input = document.getElementById('lobby-chat-input');
                input.value += emoji;
                input.focus();
            };
            grid.appendChild(div);
        });

        function toggleEmojiPicker() {
            picker.classList.toggle('open');
        }

        // Close on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') picker.classList.remove('open');
        });
    </script>
</body>

</html>
