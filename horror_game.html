<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unknown Number | Horror Chat</title>
    <link rel="stylesheet" href="horror_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="screen-static"></div>
    <div class="phone-container">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="time" id="current-time">12:00</div>
            <div class="status-icons">
                <span class="signal">📶 <span>LOW</span></span>
                <span class="battery">🪫 1%</span>
            </div>
        </div>

        <!-- Chat Header -->
        <div class="chat-header">
            <div class="back-btn">‹</div>
            <div class="contact-info">
                <div class="avatar" id="contact-avatar">?</div>
                <div class="details">
                    <h2 class="contact-name" id="contact-name">Unknown Number</h2>
                    <p class="status" id="contact-status">Typing...</p>
                </div>
            </div>
            <div class="header-icons">📞</div>
        </div>

        <!-- Chat Area -->
        <div class="chat-body" id="chat-body">
            <!-- Messages will be injected here -->
        </div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typing-indicator">
            <span></span><span></span><span></span>
        </div>

        <!-- Choice Area -->
        <div class="choice-container" id="choice-container">
            <!-- Choices will be injected here -->
        </div>

        <!-- Input Area (Functional) -->
        <div class="input-area">
            <div class="plus-icon">+</div>
            <input type="text" class="message-input" id="message-input" placeholder="Type a response..." autocomplete="off">
            <div class="send-btn" id="send-btn">➤</div>
        </div>

        <div class="home-indicator"></div>
    </div>

    <!-- Death/Ending Overlay -->
    <div id="game-over" class="overlay">
        <h1 class="glitch" data-text="SIGNAL LOST">SIGNAL LOST</h1>
        <p id="death-reason">You shouldn't have said that.</p>
        <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
            <button class="retry-btn" onclick="location.reload()">RECONNECT</button>
            <button class="quit-lobby-btn" onclick="window.location.href='index.html'" style="background: transparent; border: 1px solid #444; color: #666; width: 220px; padding: 12px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 14px; letter-spacing: 2px;">QUIT TO ARENA</button>
        </div>
    </div>

    <!-- Intro Overlay -->
    <div id="intro-overlay" class="overlay active">
        <div class="intro-content">
            <h1 class="glitch-title">THE UNKNOWN</h1>
            <p>You received a new message.</p>
            <button class="start-btn" onclick="startGame()">OPEN MESSAGE</button>
            <button class="quit-btn" onclick="window.location.href='index.html'" style="margin-top: 15px; background: transparent; border: 1px solid #444; color: #666; width: 220px; padding: 12px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 14px; letter-spacing: 2px;">QUIT TO ARENA</button>
        </div>
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>
    <audio id="glitch-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="bg-music" src="atlasaudio-horror-ambience-512255.mp3" loop></audio>

    <script src="horror_script.js"></script>
</body>
</html>
