<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Cricket - Waiting Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --accent: #fff;
            --neon-green: #00ffaa;
            --border: #113322;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg);
            color: var(--accent);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #bg-effect {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('cricket_stadium_bg.png') no-repeat center center;
            background-size: cover;
            z-index: 1;
            opacity: 0.35;
        }

        .grand-lobby-shell {
            z-index: 10;
            width: 100vw; height: 100vh;
            padding: 30px 50px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 30px;
            animation: fadeIn 1s ease-out;
            position: relative;
        }

        .grand-header {
            background: rgba(10,20,15,0.8); border: 1px solid var(--border);
            border-radius: 20px; padding: 12px 25px;
            display: flex; justify-content: space-between; align-items: center;
            height: 70px;
        }

        .header-left {
            display: flex; align-items: center; gap: 15px; width: 33%;
        }

        .cricket-icon { font-size: 24px; filter: drop-shadow(0 0 5px var(--neon-green)); }
        
        .header-text-group { display: flex; flex-direction: column; }
        .room-label { font-size: 11px; font-weight: 900; color: #aaa; letter-spacing: 1px; }

        .arena-id-display {
            background: #0f1a15; border: 1px solid var(--neon-green);
            padding: 8px 25px; border-radius: 12px;
            font-size: 14px; font-weight: 950; color: var(--neon-green);
            letter-spacing: 4px; text-shadow: 0 0 10px rgba(0,255,170,0.3);
            text-align: center;
        }

        .header-controls { display: flex; gap: 10px; align-items: center; justify-content: flex-end; width: 33%; }

        .exit-btn {
            background: #111; border: 1px solid #333; border-radius: 10px;
            padding: 8px 15px; display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: 0.3s;
        }
        .exit-btn:hover { background: #500; border-color: #f00; }
        .exit-txt { font-size: 10px; font-weight: 900; color: #fff; text-transform: uppercase; }

        /* Matchup Area */
        .arena-matchup {
            display: flex; justify-content: space-around; align-items: center;
            flex-grow: 1; padding: 20px 0;
        }

        .premium-card {
            width: 350px; height: 180px;
            background: #080d0a; border: 1px solid var(--border);
            border-radius: 25px; padding: 25px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 40px 100px rgba(0,255,170,0.05);
            position: relative; transition: 0.4s; gap: 15px;
        }

        .premium-card.dashed {
            border: 2px dashed #1a3322; background: none; box-shadow: none;
        }

        .player-main .name { font-size: 24px; font-weight: 950; color: #fff; letter-spacing: 2px; }
        .player-main .tag { font-size: 11px; color: var(--neon-green); font-weight: 900; text-transform: uppercase;}

        .trophy-vs { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .trophy-top { font-size: 40px; font-weight: 950; color: #fff; text-shadow: 0 0 20px #fff; }

        .waiting-slot { display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 15px;}
        .waiting-label { font-size: 22px; font-weight: 950; letter-spacing: 5px; color: #555; }

        .invite-friends-btn {
            position: fixed; bottom: 40px; left: 50px;
            width: fit-content; height: 50px;
            background: #000; border: 1px solid var(--neon-green); border-radius: 15px;
            color: var(--neon-green); display: flex; align-items: center; gap: 15px;
            padding: 0 25px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,255,170,0.1);
            z-index: 100;
        }
        .invite-friends-btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 10px 30px rgba(0,255,170,0.4); }

        .btn-lbl { text-align: left; font-size: 11px; font-weight: 950; letter-spacing: 1px; text-transform: uppercase; }

        .kickstart-btn {
            position: fixed; bottom: 40px; right: 50px;
            width: fit-content; height: 50px; padding: 0 30px;
            background: #252525; border: none; border-radius: 15px;
            color: #555; display: flex; justify-content: center; align-items: center; gap: 12px;
            font-size: 12px; font-weight: 900; letter-spacing: 2px;
            cursor: not-allowed; z-index: 100; text-transform: uppercase;
        }

        .chat-modal {
            position: fixed; bottom: 20px; right: 20px; width: 320px; height: 420px;
            background: linear-gradient(rgba(5, 10, 8, 0.75), rgba(5, 10, 8, 0.95)), url('cricket_stadium_bg.png');
            background-size: cover; background-position: center;
            border: 1px solid var(--neon-green); border-radius: 15px;
            display: flex; flex-direction: column; z-index: 200;
            box-shadow: 0 10px 40px rgba(0, 255, 170, 0.15);
            transform: translateY(120%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; pointer-events: none;
        }
        .chat-modal.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
        
        .chat-header {
            padding: 15px; border-bottom: 1px solid #1a3322; display: flex; justify-content: space-between;
            align-items: center; font-size: 12px; font-weight: 900; color: var(--neon-green); letter-spacing: 2px;
        }
        .close-chat { background: none; border: none; color: #777; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .close-chat:hover { color: #f33; }
        
        .chat-messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-msg { font-size: 12px; padding: 10px 14px; border-radius: 12px; max-width: 85%; word-wrap: break-word; font-weight: 500;}
        .chat-msg.system { background: rgba(255,255,255,0.05); color: #888; align-self: center; font-size: 10px; font-weight: 700; border-radius: 8px;}
        .chat-msg.self { background: rgba(0, 255, 170, 0.1); color: #fff; align-self: flex-end; border: 1px solid rgba(0,255,170,0.2); border-bottom-right-radius: 2px; }
        .chat-msg.other { background: rgba(255, 255, 255, 0.1); color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .chat-input-area { display: flex; padding: 15px; gap: 10px; border-top: 1px solid #1a3322; }
        #chat-input {
            flex-grow: 1; background: #000; border: 1px solid #333; border-radius: 8px; padding: 10px; color: #fff;
            font-family: inherit; font-size: 12px; transition: 0.3s; outline: none;
        }
        #chat-input:focus { border-color: var(--neon-green); }
        .send-btn {
            background: var(--neon-green); color: #000; border: none; border-radius: 8px; width: 45px; cursor: pointer;
            font-size: 18px; display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .send-btn:hover { box-shadow: 0 0 15px rgba(0,255,170,0.5); }

        /* Friends Overlay Modal */
        .friends-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            z-index: 300; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .friends-overlay.active { opacity: 1; pointer-events: auto; }

        .friends-box {
            background: #050a08; border: 1px solid var(--neon-green); border-radius: 20px;
            width: 400px; max-height: 80vh; display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,255,170,0.15); overflow: hidden;
            transform: scale(0.9); transition: 0.3s;
        }
        .friends-overlay.active .friends-box { transform: scale(1); }

        .friends-header {
            padding: 20px 25px; border-bottom: 1px solid #1a3322;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; font-weight: 950; color: var(--neon-green); letter-spacing: 2px;
        }

        .friends-list { padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .friend-card {
            background: #08120d; border: 1px solid #1a3322; border-radius: 12px;
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }
        .friend-card:hover { border-color: rgba(0,255,170,0.5); background: #0a1a12; }
        
        .f-info { display: flex; align-items: center; gap: 15px; }
        .span-dot { color: #0f0; font-size: 18px; text-shadow: 0 0 10px #0f0; }
        .f-name { font-size: 14px; font-weight: 900; color: #fff; }
        .f-status { font-size: 10px; color: #aaa; font-weight: 700; text-transform: uppercase; }
        
        .invite-act-btn {
            background: none; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 8px 15px; border-radius: 8px; font-size: 11px; font-weight: 900;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .invite-act-btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px rgba(0,255,170,0.4); }

        .kickstart-btn.active-ready {
            background: var(--neon-green); color: #000; cursor: pointer;
            border: 1px solid var(--neon-green); box-shadow: 0 0 25px rgba(0,255,170,0.4);
            animation: pulseBtn 1.5s infinite alternate;
        }
        
        @keyframes pulseBtn {
            0% { box-shadow: 0 0 15px rgba(0,255,170,0.2); }
            100% { box-shadow: 0 0 35px rgba(0,255,170,0.8); }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>
    <div id="bg-effect"></div>

    <div class="grand-lobby-shell">
        <!-- Top Bar -->
        <div class="grand-header">
            <div class="header-left">
                <span class="cricket-icon">🏏</span>
                <div class="header-text-group">
                    <span class="room-label">ROOM: PRIVATE MATCH</span>
                </div>
            </div>
            
            <div class="arena-id-display" id="room-id">------</div>

            <div class="header-controls">
                <button class="chat-btn" onclick="toggleChat()" style="background: #111; border: 1px solid #333; border-radius: 10px; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; color: #fff; font-size: 14px; margin-right: 5px;">
                    💬
                </button>
                <button class="exit-btn" onclick="window.location.href='hand_cricket.html'">
                    <span class="exit-txt">LEAVE ROOM</span>
                </button>
            </div>
        </div>

        <!-- Room Matchup -->
        <div class="arena-matchup">
            <!-- Player -->
            <div class="premium-card">
                <div class="player-main">
                    <div class="name" id="my-name">PLAYER</div>
                    <div class="tag">HOST</div>
                </div>
            </div>

            <div class="trophy-vs">
                <div class="trophy-top">VS</div>
            </div>

            <!-- Waiting -->
            <div class="premium-card dashed" id="opponent-card">
                <div class="waiting-slot">
                    <div class="waiting-label">WAITING...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <button class="invite-friends-btn" onclick="openFriendsList()">
        <span class="btn-lbl">FIND OPPONENT</span>
    </button>
    
    <button class="kickstart-btn" id="start-btn" onclick="startMatch()">
        <span>START MATCH</span>
    </button>

    <!-- Friends Overlay UI -->
    <div class="friends-overlay" id="friends-modal">
        <div class="friends-box">
            <div class="friends-header">
                <span>ONLINE FRIENDS</span>
                <button class="close-chat" onclick="closeFriendsList()">✖</button>
            </div>
            <div class="friends-list">
                <!-- Friend 1 -->
                <div class="friend-card">
                    <div class="f-info">
                        <span class="span-dot">•</span>
                        <div>
                            <div class="f-name">RAHUL_PRO</div>
                            <div class="f-status">IDLE - LOBBY</div>
                        </div>
                    </div>
                    <button class="invite-act-btn" onclick="invitePlayer('Rahul_Pro')">INVITE</button>
                </div>
                <!-- Friend 2 -->
                <div class="friend-card">
                    <div class="f-info">
                        <span class="span-dot" style="color: #0f0;">•</span>
                        <div>
                            <div class="f-name">PRIYA_GAMER</div>
                            <div class="f-status">ONLINE</div>
                        </div>
                    </div>
                    <button class="invite-act-btn" onclick="invitePlayer('Priya_Gamer')">INVITE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Modal UI -->
    <div id="chat-modal" class="chat-modal">
        <div class="chat-header">
            <span>LOBBY COMM-LINK</span>
            <button class="close-chat" onclick="toggleChat()">✖</button>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="chat-msg system">Lobby Created. Waiting for opponent...</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Enter message..." onkeypress="if(event.key === 'Enter') sendChat()">
            <button class="send-btn" onclick="sendChat()">➤</button>
        </div>
    </div>

    <script>
        window.onload = () => {
            const name = localStorage.getItem('playerName') || "PLAYER";
            document.getElementById('my-name').innerText = name.toUpperCase();
            
            // Generate random 6-digit room ID
            const chars = '0123456789';
            let id = '';
            for(let i=0; i<6; i++) id += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('room-id').innerText = `${id}`;
        };

        // Chat Scripting
        function toggleChat() {
            document.getElementById('chat-modal').classList.toggle('open');
            setTimeout(() => document.getElementById('chat-input').focus(), 300);
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(!msg) return;

            const box = document.getElementById('chat-messages');
            const el = document.createElement('div');
            el.className = 'chat-msg self';
            el.innerText = msg;
            box.appendChild(el);
            
            box.scrollTop = box.scrollHeight;
            input.value = '';
        }

        // Friends Overlay Scripting
        function openFriendsList() {
            document.getElementById('friends-modal').classList.add('active');
        }

        function closeFriendsList() {
            document.getElementById('friends-modal').classList.remove('active');
        }

        function invitePlayer(playerName) {
            closeFriendsList();
            
            // Show auto system chat message
            const box = document.getElementById('chat-messages');
            const el1 = document.createElement('div');
            el1.className = 'chat-msg system';
            el1.innerText = `Invite sent to ${playerName.toUpperCase()}...`;
            box.appendChild(el1);
            box.scrollTop = box.scrollHeight;

            if(!document.getElementById('chat-modal').classList.contains('open')){
                toggleChat();
            }

            // Simulate opponent accepting and joining
            setTimeout(() => {
                const el2 = document.createElement('div');
                el2.className = 'chat-msg system';
                el2.style.color = 'var(--neon-green)';
                el2.innerText = `${playerName.toUpperCase()} HAS JOINED THE LOBBY!`;
                box.appendChild(el2);
                box.scrollTop = box.scrollHeight;

                // Update opponent card UI
                const oppCard = document.getElementById('opponent-card');
                oppCard.classList.remove('dashed');
                oppCard.innerHTML = `
                    <div class="player-main" style="display:flex; flex-direction:column; align-items:center;">
                        <div class="name" style="font-size:24px; font-weight:950; color:#fff; letter-spacing:2px;">${playerName.toUpperCase()}</div>
                        <div class="tag" style="font-size:11px; color:#ffaa00; font-weight:900; text-transform:uppercase;">GUEST</div>
                    </div>
                `;

                // Activate Kickstart
                const startBtn = document.getElementById('start-btn');
                startBtn.classList.add('active-ready');
            }, 2500);
        }

        function startMatch() {
            if(document.getElementById('start-btn').classList.contains('active-ready')) {
                window.location.href = 'hand_cricket.html';
            }
        }
    </script>
</body>
</html>
