<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Cricket | Player Identity</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;700;900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: #000;
        }

        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8) blur(1px);
            opacity: 0;
            scale: 1.1;
            animation: fadeIn 2s forwards, slowPan 30s linear infinite alternate;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes slowPan {
            from { transform: scale(1.1) translateX(-2%); }
            to { transform: scale(1.1) translateX(2%); }
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            z-index: 2;
        }

        #login-card {
            position: relative;
            z-index: 10;
            width: 360px;
            padding: 40px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            text-align: center;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: cardSlideUp 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardSlideUp {
            from { transform: translate(-50%, -40%); opacity: 0; }
            to { transform: translate(-50%, -50%); opacity: 1; }
        }

        h2 {
            color: #fff;
            margin: 0 0 10px;
            letter-spacing: 5px;
            font-weight: 950;
            text-transform: uppercase;
        }

        p {
            color: #888;
            font-size: 11px;
            letter-spacing: 3px;
            margin-bottom: 35px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Google Login Button */
        #google-login-btn {
            background: #000;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 15px 30px;
            width: 100%;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        #google-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.1);
            background: #111;
        }

        #google-logo {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .btn-text {
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-family: 'Outfit', sans-serif;
        }

        /* Decorative Lights */
        .spotlight {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(57, 255, 20, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            animation: spotMoving 10s linear infinite alternate;
        }

        @keyframes spotMoving {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 30%); }
        }

        #back-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        #back-btn:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <div id="bg-container">
        <img id="bg-image" src="cricket_ground_bg.png" alt="Cricket Ground Background">
        <div class="overlay"></div>
    </div>

    <div class="spotlight"></div>
    
    <!-- Clerk Auth SDK -->
    <script async crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_c3VidGxlLW5hcndoYWwtNTAuY2xlcmsuYWNjb3VudHMuZGV2JA"
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" type="text/javascript"></script>
    <script src="https://accounts.google.com/gsi/client" async></script>

    <button id="back-btn" onclick="window.location.href='index.html'">&larr; BACK TO HUB</button>

    <div id="login-card">
        <div style="font-size: 50px; margin-bottom: 25px;">🏏</div>
        <h2 style="margin-bottom: 20px;">HAND CRICKET</h2>
        
        <!-- Clerk Sign-In UI Container -->
        <div id="clerk-signin-ui" style="min-height: 200px; display: flex; justify-content: center; align-items: center;">
            <div style="color: #fff; opacity: 0.5; font-size: 12px; letter-spacing: 2px;">INITIALIZING AUTH...</div>
        </div>

        <div style="margin-top: 30px; opacity: 0.4; font-size: 10px; letter-spacing: 3px; color: #fff; font-weight: 900; text-transform: uppercase;">
            POWERED BY ATC STUDIO ENGINE
        </div>
    </div>

    <script>
        const CLERK_PUBLISHABLE_KEY = "pk_test_c3VidGxlLW5hcndoYWwtNTAuY2xlcmsuYWNjb3VudHMuZGV2JA";

        // Initialize Clerk and check for existing session
        window.addEventListener('load', async () => {
            const checkClerk = setInterval(async () => {
                if (typeof Clerk !== 'undefined') {
                    clearInterval(checkClerk);
                    
                    try {
                        // Explicitly load Clerk
                        if (!Clerk.isReady()) {
                            await Clerk.load({ publishableKey: CLERK_PUBLISHABLE_KEY });
                        }
                        
                        // If user is already signed in, handle it
                        if (Clerk.user) {
                            const user = Clerk.user;
                            const playerName = user.fullName || user.firstName || "CRICKET PLAYER";
                            localStorage.setItem('playerName', playerName);
                            if (user.imageUrl) localStorage.setItem('playerAvatar', user.imageUrl);

                            document.querySelector('h2').innerText = "WELCOME, " + playerName.toUpperCase();
                            document.getElementById('clerk-signin-ui').innerHTML = "<div style='color: #39FF14; font-weight: 900; letter-spacing: 2px;'>AUTHENTICATED!</div>";
                            
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 1000);
                        } else {
                            // Mount the Sign-In UI exactly like in the main game
                            const container = document.getElementById('clerk-signin-ui');
                            Clerk.mountSignIn(container, {
                                appearance: {
                                    theme: 'dark',
                                    variables: { colorPrimary: '#39FF14' }
                                }
                            });
                        }
                    } catch (err) {
                        console.error("Clerk Error:", err);
                        document.getElementById('clerk-signin-ui').innerText = "ERROR LOADING AUTH.";
                    }
                }
            }, 100);
            setTimeout(() => clearInterval(checkClerk), 5000);
        });
    </script>

</body>
</html>
