<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Cricket | Player Identity</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;700;900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: #000;
        }

        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6) blur(2px);
            opacity: 0;
            animation: fadeIn 1.5s forwards;
            scale: 1.1;
            animation: slowPan 20s linear infinite alternate;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes slowPan {
            from { transform: scale(1.1) translateX(-2%); }
            to { transform: scale(1.1) translateX(2%); }
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            z-index: 2;
        }

        #login-card {
            position: relative;
            z-index: 10;
            width: 360px;
            padding: 40px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            text-align: center;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: cardSlideUp 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardSlideUp {
            from { transform: translate(-50%, -40%); opacity: 0; }
            to { transform: translate(-50%, -50%); opacity: 1; }
        }

        h2 {
            color: #fff;
            margin: 0 0 10px;
            letter-spacing: 5px;
            font-weight: 950;
            text-transform: uppercase;
        }

        p {
            color: #888;
            font-size: 11px;
            letter-spacing: 3px;
            margin-bottom: 35px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Google Login Button */
        #google-login-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 30px;
            width: 100%;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
        }

        #google-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
            border-color: #39FF14;
        }

        #google-logo {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .btn-text {
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-family: 'Outfit', sans-serif;
        }

        /* Decorative Lights */
        .spotlight {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(57, 255, 20, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            animation: spotMoving 10s linear infinite alternate;
        }

        @keyframes spotMoving {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 30%); }
        }

        #back-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        #back-btn:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <div id="bg-container">
        <img id="bg-image" src="cricket_ground_bg.png" alt="Cricket Ground Background">
        <div class="overlay"></div>
    </div>

    <div class="spotlight"></div>
    
    <button id="back-btn" onclick="window.location.href='index.html'">&larr; BACK TO HUB</button>

    <div id="login-card">
        <div style="font-size: 40px; margin-bottom: 15px;">🏏</div>
        <h2>HAND CRICKET</h2>
        <p>IDENTIFY YOURSELF TO ENTER PITCH</p>
        
        <button id="google-login-btn" onclick="alert('Google Login coming soon!');">
            <span class="btn-text">Sign in with Google</span>
        </button>

        <div style="margin-top: 30px; opacity: 0.2; font-size: 9px; letter-spacing: 2px; color: #fff; font-weight: 900;">
            POWERED BY ATC STUDIO ENGINE
        </div>
    </div>

</body>
</html>
