<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Cricket Arena - Live Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --neon-green: #00ffaa;
            --glass: rgba(5, 10, 8, 0.9);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        #bg-effect {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('cricket_stadium_bg.png') no-repeat center center;
            background-size: cover; z-index: -1;
            opacity: 0.4;
        }

        .arena-shell {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            padding: 40px 0;
        }

        .match-header {
            width: 90%; max-width: 1200px;
            background: var(--glass); border: 1px solid #1a3322;
            border-radius: 20px; padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            position: relative;
        }

        .kb-indicator {
            position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
            font-size: 10px; font-weight: 900; color: #555; letter-spacing: 1px;
            text-transform: uppercase; transition: 0.3s;
        }
        .kb-indicator.active { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

        .kb-toggle {
            background: #111; border: 1px solid #333; border-radius: 10px;
            padding: 8px 12px; cursor: pointer; color: #888; font-size: 14px;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .kb-toggle.active { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 15px rgba(0,255,170,0.2); }
        .kb-toggle:hover { background: #222; }

        .score-box { text-align: center; }
        .score-val { font-size: 40px; font-weight: 950; color: var(--neon-green); margin-bottom: -5px; }
        .score-lbl { font-size: 10px; font-weight: 900; color: #888; letter-spacing: 2px; }

        .timer-ring {
            width: 60px; height: 60px; border-radius: 50%;
            border: 4px solid #111; border-top-color: var(--neon-green);
            display: flex; justify-content: center; align-items: center;
            font-size: 22px; font-weight: 950; color: var(--neon-green);
            animation: spinTimer 1s linear infinite;
        }
        @keyframes spinTimer { to { transform: rotate(360deg); } }
        .timer-val { animation: stopSpin 1s linear infinite; }
        @keyframes stopSpin { to { transform: rotate(-360deg); } }

        .vs-tag {
            font-size: 30px; font-weight: 950; color: #fff;
            background: #111; padding: 10px 20px; border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,255,170,0.1);
        }

        /* Result Overlay */
        .result-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 500;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .result-title { font-size: 60px; font-weight: 950; color: var(--neon-green); margin-bottom: 10px; }
        .result-sub { font-size: 20px; color: #888; letter-spacing: 2px; }

        /* Professional Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal-card {
            background: #0a0f0d; border: 1px solid var(--neon-green);
            border-radius: 25px; padding: 40px; width: 400px; text-align: center;
            box-shadow: 0 0 50px rgba(0,255,170,0.3);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-title { font-size: 28px; font-weight: 950; color: var(--neon-green); margin-bottom: 15px; letter-spacing: 2px; }
        .modal-msg { font-size: 16px; color: #aaa; margin-bottom: 30px; line-height: 1.6; }
        .modal-btn {
            background: var(--neon-green); color: #000; border: none;
            padding: 12px 40px; border-radius: 12px; font-size: 14px; font-weight: 900;
            cursor: pointer; transition: 0.3s;
        }
        .modal-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--neon-green); }

        /* Innings Overlay */
        .innings-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 600;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .target-tag { color: var(--neon-green); font-size: 40px; font-weight: 950; margin: 20px 0; }
        .countdown-wrap { font-size: 14px; letter-spacing: 2px; color: #555; }
        #innings-timer { color: var(--neon-green); font-weight: 900; }

        .arena-main {
            flex-grow: 1; width: 90%; display: flex; align-items: center; justify-content: space-around;
        }

        .player-zone {
            width: 350px; height: 450px;
            background: var(--glass); border: 1px solid #1a3322;
            border-radius: 30px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .player-zone.active { border-color: var(--neon-green); box-shadow: 0 0 40px rgba(0,255,170,0.2); }

        .hand-display { font-size: 150px; margin-bottom: 20px; }
        .player-info { text-align: center; }
        .p-name { font-size: 24px; font-weight: 950; color: #fff; letter-spacing: 2px; }
        .p-role { font-size: 12px; color: var(--neon-green); font-weight: 900; letter-spacing: 1px; }

        .control-panel {
            width: 90%; max-width: 800px;
            background: var(--glass); border: 1px solid #1a3322;
            border-radius: 20px; padding: 20px;
            display: flex; justify-content: center; gap: 15px;
        }

        .move-btn {
            width: 70px; height: 70px; background: #111;
            border: 1px solid #333; border-radius: 15px;
            color: #fff; font-size: 24px; font-weight: 900;
            cursor: pointer; transition: 0.3s;
        }

        .move-btn:hover { background: var(--neon-green); color: #000; border-color: var(--neon-green); transform: translateY(-5px); }

    </style>
</head>
<body>
    <div id="bg-effect"></div>

    <div class="arena-shell">
        <div class="match-header">
            <div class="score-box">
                <div class="score-val" id="my-score">0</div>
                <div class="score-lbl">YOUR SCORE</div>
            </div>

            <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
                <div class="vs-tag" id="innings-status">INN-1</div>
                <div class="kb-indicator" id="kb-status">KEYBOARD ACCESS: OFF</div>
                <div id="target-display" style="display:none; color:var(--neon-green); font-weight:900; font-size:12px; margin-top:5px;">TARGET: 0</div>
            </div>

            <div style="display:flex; align-items:center; gap:20px;">
                <button class="kb-toggle" id="kb-toggle-btn" onclick="toggleKeyboardAccess()">
                    <span>⌨️</span>
                    <span style="font-size:10px; font-weight:900;">KEYBOARD</span>
                </button>
                <div class="score-box">
                    <div class="score-val" id="opp-score">0</div>
                    <div class="score-lbl">OPPONENT SCORE</div>
                </div>
            </div>
        </div>

        <div class="arena-main">
            <div class="player-zone active" id="my-zone">
                <div class="timer-ring" style="margin-bottom:20px;">
                    <span class="timer-val" id="my-timer-sec">10</span>
                </div>
                <div class="hand-display" id="my-hand">✋</div>
                <div class="player-info">
                    <div class="p-name" id="user-name">PLAYER</div>
                    <div class="p-role" id="user-role">BATTING</div>
                </div>
            </div>
            <div class="player-zone" id="opp-zone">
                <div class="timer-ring" style="margin-bottom:20px;">
                    <span class="timer-val" id="opp-timer-sec">10</span>
                </div>
                <div class="hand-display" id="opp-hand">❓</div>
                <div class="player-info">
                    <div class="p-name" id="opp-name">OPPONENT</div>
                    <div class="p-role" id="opp-role">BOWLING</div>
                </div>
            </div>
        </div>

        <div class="control-panel" id="main-controls">
            <button class="move-btn" onclick="sendMove(1)">1</button>
            <button class="move-btn" onclick="sendMove(2)">2</button>
            <button class="move-btn" onclick="sendMove(3)">3</button>
            <button class="move-btn" onclick="sendMove(4)">4</button>
            <button class="move-btn" onclick="sendMove(5)">5</button>
            <button class="move-btn" onclick="sendMove(6)">6</button>
            <button class="move-btn" onclick="sendMove(7)">7</button>
            <button class="move-btn" onclick="sendMove(8)">8</button>
            <button class="move-btn" onclick="sendMove(9)">9</button>
            <button class="move-btn" onclick="sendMove(10)">10</button>
        </div>
    </div>

    <!-- Custom Professional Alert Modal -->
    <div class="modal-overlay" id="custom-modal">
        <div class="modal-card">
            <div class="modal-title" id="modal-title">ALERT</div>
            <div class="modal-msg" id="modal-msg">Message goes here...</div>
            <button class="modal-btn" onclick="closeAlert()">CONTINUE</button>
        </div>
    </div>

    <!-- Innings Transition Overlay -->
    <div class="innings-overlay" id="innings-screen">
        <div class="result-title">READY FOR SECOND INNINGS</div>
        <div class="target-tag" id="target-text">TARGET: 0</div>
        <div class="result-sub" id="role-swap-text">ROLES ARE SWAPPING...</div>
        <div class="countdown-wrap" style="margin-top:50px;">RESUMING IN <span id="innings-timer">20</span>s</div>
    </div>

    <!-- Result Overlay -->
    <div class="result-overlay" id="result-screen">
        <div class="result-title" id="final-status">YOU WIN!</div>
        <div class="result-sub" id="final-reason">OPPONENT FAILED TO PLAY</div>
        <div class="countdown-wrap" style="margin-top:20px;">RETURNING TO LOBBY IN <span id="lobby-timer">10</span>s</div>
        <button class="kb-toggle active" style="margin-top:20px; padding:10px 30px;" onclick="exitArena()">
            EXIT NOW
        </button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let myRole = 'batting';
        let myName = 'PLAYER';
        let oppName = 'OPPONENT';
        let isBot = localStorage.getItem('hc_isBot') === 'true';
        let roomId = localStorage.getItem('hc_roomId') || 'HC-ACTIVE-MATCH';
        let socket;
        
        let currentInnings = 1;
        let targetScore = null;
        
        let myTimer = 10;
        let oppTimer = 10;
        let timerInterval;
        
        let myChoice = null;
        let oppChoice = null;
        let myScore = 0;
        let oppScore = 0;
        
        let ballsInInnings = 0;
        let consecutiveHits = 0;
        let lastHitNum = null;

        window.onload = () => {
            myRole = localStorage.getItem('hc_player_role') || 'batting';
            myName = localStorage.getItem('playerName') || 'YOU';
            oppName = localStorage.getItem('hc_opponentName') || 'OPPONENT';
            
            // Refresh Lock & Keyboard Overrides
            window.onbeforeunload = function() {
                return "REFRESH LOCKED FOR THIS PAGE";
            };

            window.addEventListener('keydown', function(e) {
                // Block F5, Ctrl+R, Cmd+R
                if ((e.which || e.keyCode) == 116 || (e.ctrlKey && e.keyCode == 82) || (e.metaKey && e.keyCode == 82)) {
                    e.preventDefault();
                    showAlert("REFRESH LOCKED", "Manual refresh is disabled during active matches to prevent synchronization loss. Please finish your match!");
                }
            });

            updateUIRoles();
            
            try {
                socket = io();
                socket.on('connect', () => {
                    socket.emit('join_room', { roomId, playerName: myName, isCreating: false });
                });

                socket.on('hc_match_moved', (data) => {
                    oppChoice = data.num;
                    document.getElementById('opp-hand').innerText = "✅";
                    document.getElementById('opp-zone').classList.add('active');
                    checkTurnCompletion();
                });
            } catch(e) { console.error(e); }

            startTimers();

            window.addEventListener('keydown', (e) => {
                if (!kbActive) return;
                const key = e.key;
                if (key >= '1' && key <= '9') sendMove(parseInt(key));
                else if (key === '0') sendMove(10);
            });
        };

        function updateUIRoles() {
            document.getElementById('user-name').innerText = myName.toUpperCase();
            document.getElementById('opp-name').innerText = oppName.toUpperCase();
            document.getElementById('user-role').innerText = myRole.toUpperCase();
            document.getElementById('opp-role').innerText = myRole === 'batting' ? 'BOWLING' : 'BATTING';
            
            const myZone = document.getElementById('my-zone');
            const oppZone = document.getElementById('opp-zone');
            
            if (myRole === 'batting') {
                myZone.style.borderColor = 'var(--neon-green)';
                oppZone.style.borderColor = '#1a3322';
            } else {
                oppZone.style.borderColor = 'var(--neon-green)';
                myZone.style.borderColor = '#1a3322';
            }
        }

        function startTimers() {
            myTimer = 10;
            oppTimer = 10;
            document.getElementById('my-timer-sec').innerText = myTimer;
            document.getElementById('opp-timer-sec').innerText = oppTimer;
            
            isBot = localStorage.getItem('hc_isBot') === 'true';
            if (isBot) triggerBotMove();

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (myChoice === null) {
                    myTimer--;
                    document.getElementById('my-timer-sec').innerText = myTimer;
                }
                if (oppChoice === null) {
                    oppTimer--;
                    document.getElementById('opp-timer-sec').innerText = oppTimer;
                }

                if (myTimer <= 0) {
                    clearInterval(timerInterval);
                    showResult("YOU LOSE", "TIME EXPIRED! YOU FAILED TO PLAY.");
                } else if (oppTimer <= 0) {
                    clearInterval(timerInterval);
                    showResult("YOU WIN!", `OPPONENT (${oppName}) FAILED TO PLAY IN TIME!`);
                }
            }, 1000);
        }

        function triggerBotMove() {
            const thinkingTime = 500 + Math.random() * 2000; 
            setTimeout(() => {
                if (oppChoice !== null) return;
                oppChoice = Math.floor(Math.random() * 10) + 1;
                document.getElementById('opp-hand').innerText = "✅";
                document.getElementById('opp-zone').classList.add('active');
                checkTurnCompletion();
            }, thinkingTime);
        }

        function sendMove(num) {
            if (myChoice !== null) return;
            myChoice = num;
            document.getElementById('my-hand').innerText = num;
            document.getElementById('my-zone').classList.remove('active');
            if (socket) {
                socket.emit('hc_match_move', { roomId, num, playerName: myName, role: myRole });
            }
            checkTurnCompletion();
        }

        function checkTurnCompletion() {
            if (myChoice !== null && oppChoice !== null) {
                clearInterval(timerInterval);
                calculateMatch();
            }
        }

        function calculateMatch() {
            const myHandEl = document.getElementById('my-hand');
            const oppHandEl = document.getElementById('opp-hand');
            myHandEl.innerText = myChoice;
            oppHandEl.innerText = oppChoice;

            ballsInInnings++;

            setTimeout(() => {
                const isOut = (myChoice === oppChoice);

                if (currentInnings === 1) {
                    if (isOut) {
                        let msg = "OUT!";
                        if (ballsInInnings === 1) {
                            msg = (myRole === 'batting') ? "DUCK OUT!" : "WELL BOWLED!";
                        }
                        startSecondInnings(msg);
                    } else {
                        updateScore();
                        prepareNextBall();
                    }
                } else {
                    // Innings 2 Chasing logic
                    if (isOut) {
                        let msgTitle = "OUT!";
                        let msgReason = `FAILED TO REACH TARGET OF ${targetScore}`;
                        
                        if (ballsInInnings === 1) {
                            if (myRole === 'batting') { msgTitle = "DUCK OUT!"; msgReason = "OUT ON THE FIRST BALL!"; }
                            else { msgTitle = "WELL BOWLED!"; msgReason = "CLUTCH DEFENSE!"; }
                        }
                        
                        if (myRole === 'batting') showResult(msgTitle, msgReason);
                        else showResult(msgTitle === "WELL BOWLED!" ? "YOU WIN!" : "WICKET!", msgReason);
                    } else {
                        updateScore();
                        checkChaseSuccess();
                    }
                }
            }, 1500);
        }

        function updateScore() {
            if (myRole === 'batting') {
                let runs = myChoice;
                if (myChoice === lastHitNum) consecutiveHits++;
                else { consecutiveHits = 1; lastHitNum = myChoice; }

                if (consecutiveHits === 3) {
                    runs += myChoice;
                    consecutiveHits = 0;
                    showAlert("HAT-TRICK BONUS!", `Incredible! Three consecutive ${myChoice}s earned you a double bonus!`);
                }
                myScore += runs;
                document.getElementById('my-score').innerText = myScore;
            } else {
                oppScore += oppChoice;
                document.getElementById('opp-score').innerText = oppScore;
            }
        }

        function prepareNextBall() {
            myChoice = null;
            oppChoice = null;
            document.getElementById('my-hand').innerText = "❓";
            document.getElementById('opp-hand').innerText = "❓";
            document.getElementById('my-zone').classList.add('active');
            document.getElementById('opp-zone').classList.remove('active');
            startTimers();
        }

        function checkChaseSuccess() {
            const currentBattingScore = (myRole === 'batting') ? myScore : oppScore;
            if (currentBattingScore >= targetScore) {
                if (myRole === 'batting') showResult("YOU WON!", `SUCCESSFULLY CHASED ${targetScore} RUNS!`);
                else showResult("YOU LOSE", `OPPONENT REACHED THE TARGET OF ${targetScore}.`);
            } else {
                prepareNextBall();
            }
        }

        function startSecondInnings(customMsg) {
            const firstInnScore = (myRole === 'batting') ? myScore : oppScore;
            targetScore = firstInnScore + 1;
            
            const screen = document.getElementById('innings-screen');
            document.getElementById('target-text').innerText = `TARGET: ${targetScore}`;
            if (customMsg) document.querySelector('.result-title').innerText = customMsg;
            else document.querySelector('.result-title').innerText = "READY FOR SECOND INNINGS";
            
            // Start at 20 immediately
            let count = 20;
            document.getElementById('innings-timer').innerText = count;
            screen.style.display = 'flex';

            const innT = setInterval(() => {
                count--;
                document.getElementById('innings-timer').innerText = count;
                if (count <= 0) {
                    clearInterval(innT);
                    screen.style.display = 'none';
                    swappingRolesLogic();
                }
            }, 1000);
        }

        function swappingRolesLogic() {
            currentInnings = 2;
            ballsInInnings = 0;
            myRole = (myRole === 'batting') ? 'bowling' : 'batting';
            
            // UI Reset
            document.getElementById('innings-status').innerText = 'INN-2';
            document.getElementById('target-display').innerText = `TARGET: ${targetScore}`;
            document.getElementById('target-display').style.display = 'block';
            
            myChoice = null; oppChoice = null;
            myScore = 0; oppScore = 0;
            document.getElementById('my-score').innerText = 0;
            document.getElementById('opp-score').innerText = 0;
            document.getElementById('my-hand').innerText = "❓";
            document.getElementById('opp-hand').innerText = "❓";
            
            updateUIRoles();
            startTimers();
        }

        function resetMatchData() {
            // Cleanup persistence tokens
            localStorage.removeItem('hc_toss_outcome');
            localStorage.removeItem('hc_toss_winner');
            localStorage.removeItem('hc_toss_choice');
            localStorage.removeItem('hc_player_role');
            // We keep hc_opponentName and hc_isBot until back in room
            window.onbeforeunload = null; 
        }

        function showResult(status, reason) {
            const screen = document.getElementById('result-screen');
            document.getElementById('final-status').innerText = status;
            document.getElementById('final-reason').innerText = reason;
            
            // Start at 10 immediately
            let exitCount = 10;
            document.getElementById('lobby-timer').innerText = exitCount;
            screen.style.display = 'flex';
            
            const exitT = setInterval(() => {
                exitCount--;
                document.getElementById('lobby-timer').innerText = exitCount;
                if (exitCount <= 0) {
                    clearInterval(exitT);
                    resetMatchData();
                    window.location.href = 'hand_cricket_room.html';
                }
            }, 1000);
        }

        function exitArena() {
            resetMatchData();
            window.location.href = 'hand_cricket_room.html';
        }


        function closeAlert() {
            document.getElementById('custom-modal').style.display = 'none';
            if (window.pendingCallback) {
                window.pendingCallback();
                window.pendingCallback = null;
            }
        }

        function showAlert(title, msg, callback) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('custom-modal').style.display = 'flex';
            if (callback) window.pendingCallback = callback;
        }

        let kbActive = false;
        function toggleKeyboardAccess() {
            kbActive = !kbActive;
            const btn = document.getElementById('kb-toggle-btn');
            const status = document.getElementById('kb-status');
            const controlPanel = document.getElementById('main-controls');
            
            if (kbActive) {
                btn.classList.add('active');
                status.classList.add('active');
                status.innerText = "KEYBOARD ACCESS: ON (1-9, 0=10)";
                controlPanel.style.display = 'none';
            } else {
                btn.classList.remove('active');
                status.classList.remove('active');
                status.innerText = "KEYBOARD ACCESS: OFF";
                controlPanel.style.display = 'flex';
            }
        }
    </script>
</body>
</html>
