<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake & Ladder - Cinematic Initiation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030a08;
            --jungle-green: #00ff88;
            --gold: #ffcc00;
            --snake-red: #ff3333;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Cinematic Video Background - Cropped Iframe Approach */
        .video-background {
            position: absolute;
            inset: 0;
            z-index: -2;
            overflow: hidden;
            background: #000;
        }

        .video-background iframe,
        .video-background video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            filter: brightness(0.7) contrast(1.1);
        }

        /* 3D Board Visualization */
        .scene {
            perspective: 2500px;
            width: 450px;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .board-wrap {
            width: 400px;
            height: 400px;
            transform-style: preserve-3d;
            transform: rotateX(65deg) rotateZ(45deg);
            animation: boardEntrance 5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes boardEntrance {
            0% {
                transform: rotateX(90deg) rotateZ(-120deg) translateZ(-800px);
                opacity: 0;
                filter: blur(20px);
            }

            100% {
                transform: rotateX(65deg) rotateZ(45deg) translateZ(0);
                opacity: 1;
                filter: blur(0);
            }
        }

        .grid-10x10 {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template: repeat(10, 1fr) / repeat(10, 1fr);
            background: rgba(0, 255, 136, 0.05);
            border: 12px solid #111;
            box-shadow: 0 0 100px rgba(0, 255, 136, 0.1), inset 0 0 50px rgba(0, 0, 0, 1);
        }

        .cell {
            border: 1px solid rgba(0, 255, 136, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
        }

        /* Animated Snakes & Ladders */
        .ladder {
            position: absolute;
            width: 40px;
            height: 200px;
            background: repeating-linear-gradient(0deg, #555 0px, #555 5px, transparent 5px, transparent 20px);
            border-left: 4px solid var(--gold);
            border-right: 4px solid var(--gold);
            transform: translateZ(20px) rotateZ(-10deg);
            opacity: 0;
            animation: elementPop 1s ease-out forwards 3s;
        }

        .snake {
            position: absolute;
            width: 10px;
            height: 180px;
            background: linear-gradient(to bottom, var(--snake-red), #500);
            border-radius: 50px;
            filter: blur(2px);
            transform: translateZ(10px) rotateZ(20deg);
            opacity: 0;
            animation: elementPop 1s ease-out forwards 4s;
        }

        @keyframes elementPop {
            from {
                transform: translateZ(-50px) scale(0);
                opacity: 0;
            }

            to {
                transform: translateZ(20px) scale(1);
                opacity: 0.3;
            }
        }

        /* UI Panel */
        .ui-panel {
            margin-top: 50px;
            text-align: center;
            z-index: 100;
        }

        .title {
            font-size: 70px;
            font-weight: 950;
            letter-spacing: 10px;
            background: linear-gradient(to bottom, #fff, var(--jungle-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .loader-bar {
            width: 400px;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            margin: 20px auto;
        }

        .loader-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: var(--jungle-green);
            box-shadow: 0 0 20px var(--jungle-green);
        }

        .status {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 5px;
            color: #555;
            text-transform: uppercase;
        }

        #countdown {
            position: fixed;
            top: 40px;
            right: 40px;
            font-size: 14px;
            font-weight: 950;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="video-background">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="https://cdn.jsdelivr.net/gh/vasa420/genz-play/Snake_and_Ladder_Video_Intro.mp4" type="video/mp4">
        </video>
    </div>
    <div id="countdown">INIT // 15.0</div>

    <div class="scene">
        <div class="board-wrap">
            <div class="grid-10x10">
                <!-- 100 cells generated via JS -->
            </div>
            <!-- Decorative Elements -->
            <div class="ladder" style="top: 10%; left: 20%;"></div>
            <div class="ladder" style="top: 40%; left: 70%; height: 150px; transform: rotate(15deg);"></div>
            <div class="snake" style="top: 20%; left: 50%;"></div>
            <div class="snake" style="top: 60%; left: 10%; height: 100px;"></div>
        </div>
    </div>

    <div class="ui-panel">
        <div class="title">SNAKE REALM</div>
        <div class="status" id="status-txt">INITIALIZING JUNGLE ECOSYSTEM...</div>
        <div class="loader-bar">
            <div class="loader-fill" id="fill"></div>
        </div>
    </div>

    <audio id="intro-music" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-tribal-rhythm-2-411.mp3" type="audio/mpeg">
    </audio>

    <script>
        const grid = document.querySelector('.grid-10x10');
        for (let i = 100; i >= 1; i--) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.textContent = i;
            grid.appendChild(cell);
        }

        const fill = document.getElementById('fill');
        const st = document.getElementById('status-txt');
        const ct = document.getElementById('countdown');
        const music = document.getElementById('intro-music');

        // Start music and video on first click to bypass browser restrictions
        window.addEventListener('click', () => {
            if (music.paused) music.play();
            const video = document.getElementById('bg-video');
            if (video && video.paused) video.play();
        }, { once: true });

        let progress = 0;
        let time = 15;

        const logic = setInterval(() => {
            progress += (100 / 1500) * 10; // To complete in 15 seconds
            time -= 0.01;

            fill.style.width = progress + '%';
            ct.textContent = `INIT // ${time.toFixed(1)}`;

            if (progress > 20) st.textContent = "CONSTRUCTING VERTICAL LADDERS...";
            if (progress > 50) st.textContent = "SYNCHRONIZING REPTILE PHYSICS...";
            if (progress > 80) st.textContent = "CALIBRATING ARENA SCALE...";

            if (progress >= 100) {
                clearInterval(logic);
                music.pause(); // Music stops exactly as intro completes
                music.currentTime = 0;
                finish();
            }
        }, 10);

        function finish() {
            st.textContent = "ACCESS GRANTED";
            const flash = document.createElement('div');
            flash.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:2000;opacity:0;transition:1s;';
            document.body.appendChild(flash);

            setTimeout(() => {
                flash.style.opacity = '1';
                setTimeout(() => {
                    window.location.href = 'snake_game.html';
                }, 1000);
            }, 500);
        }
    </script>
</body>

</html>
