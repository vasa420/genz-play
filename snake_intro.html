<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE REALM | INITIALIZING</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;950&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --glass: rgba(0, 0, 0, 0.8);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            animation: moveCam 12s infinite alternate ease-in-out;
        }

        @keyframes moveCam {
            from { transform: scale(1.1) rotate(0deg); }
            to { transform: scale(1.2) rotate(2deg); }
        }

        .overlay {
            position: relative; z-index: 10;
            text-align: center; width: 80%; max-width: 500px;
        }

        .logo { 
            font-size: 100px; margin-bottom: 30px; 
            filter: drop-shadow(0 0 30px var(--primary));
            animation: logoPulse 2s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 30px var(--primary)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 60px var(--primary)); }
        }

        h1 { 
            color: #fff; font-size: 42px; font-weight: 950; 
            letter-spacing: 15px; margin-bottom: 10px; text-transform: uppercase;
        }

        p { 
            color: var(--primary); font-size: 14px; font-weight: 400; 
            letter-spacing: 5px; margin-bottom: 50px; text-transform: uppercase;
            opacity: 0.8;
        }

        .loader-container {
            width: 100%; height: 4px; background: rgba(255,255,255,0.05);
            border-radius: 10px; overflow: hidden; position: relative;
        }

        .loader-fill {
            height: 100%; background: linear-gradient(90deg, transparent, var(--primary));
            width: 0%; box-shadow: 0 0 20px var(--primary);
            animation: loadProgress 10s forwards linear;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            20% { width: 15%; }
            50% { width: 60%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }

        .status {
            margin-top: 20px; color: #444; font-size: 10px; font-weight: 950;
            letter-spacing: 3px; text-transform: uppercase;
        }

        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%);
            z-index: 5; pointer-events: none;
        }
        h1 { 
            color: #fff; font-size: 42px; font-weight: 950; 
            letter-spacing: 15px; margin-bottom: 20px; text-transform: uppercase;
        }

        .proceed-btn {
            background: linear-gradient(135deg, var(--primary) 0%, #007aff 100%);
            color: #000; border: none; padding: 15px 40px;
            font-size: 14px; font-weight: 950; letter-spacing: 3px;
            text-transform: uppercase; border-radius: 50px;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        .proceed-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px var(--primary);
        }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div id="start-overlay">
        <h1 style="font-size: 24px; letter-spacing: 8px; margin-bottom: 40px; color: #444;">THE REALM AWAITS</h1>
        <button class="proceed-btn" onclick="startIntro()">Enter Realm</button>
    </div>

    <video id="intro-video" muted loop class="bg" style="object-fit: cover;">
        <source src="Snake_and_Ladder_Video_Intro.mp4" type="video/mp4">
    </video>
    <div class="vignette"></div>

    <div class="overlay">

        <h1>SNAKE REALM</h1>
        <p>Initializing Forest...</p>

        <div class="loader-container">
            <div class="loader-fill"></div>
        </div>
        <div id="status-text" class="status">AUTHENTICATING REALM...</div>
    </div>

    <script>
        const statuses = [
            "WAKENING THE SERPENT...",
            "GATHERING DARK CLOUDS...",
            "GROWING ANCIENT TREES...",
            "PREPARING THE ARENA...",
            "REALM SYNCHRONIZED ✓"
        ];

        let i = 0;
        const statusEl = document.getElementById('status-text');
        
        const updateStatus = () => {
            if(i < statuses.length) {
                statusEl.innerText = statuses[i];
                i++;
                setTimeout(updateStatus, 2000);
            }
        };

        const video = document.getElementById('intro-video');
        const overlay = document.getElementById('start-overlay');
        
        function startIntro() {
            if(video) {
                video.muted = false;
                video.play().then(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.style.display = 'none', 500);
                    updateStatus();
                    setTimeout(() => { window.location.href = 'snake_login.html'; }, 10000);
                }).catch(e => {
                    video.muted = true;
                    video.play();
                });
            }
        }
    </script>
</body>
</html>
