<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Realm | Classic Tactical Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;950&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffc107;
            --secondary: #fff176;
            --snake: #4caf50;
            --ladder: #2196f3;
            --bg: #fffde7;
            --text: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            background: linear-gradient(135deg, #fff 0%, #fff9c4 100%);
        }

        .sidebar {
            width: 320px;
            background: #fff;
            border-right: 2px solid #eee;
            display: flex;
            flex-direction: column;
            padding: 30px;
            z-index: 100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.05);
        }

        .game-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 50px;
            letter-spacing: 2px;
            color: #ff9800;
            margin-bottom: 5px;
        }

        .game-subtitle {
            font-size: 10px;
            color: #ff9800;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .player-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .player-card.active {
            border-color: #ff9800;
            background: #fff8e1;
            transform: scale(1.05);
        }

        .avatar {
            width: 45px; height: 45px;
            background: #fff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .player-name { font-weight: 950; font-size: 14px; }
        .player-pos { font-size: 11px; color: #888; }

        .arena {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .board-wrapper {
            padding: 20px;
            background: #fbc02d;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(10, 60px);
            grid-template-rows: repeat(10, 60px);
            background: #fff;
            border: 4px solid #fff;
            position: relative;
        }

        #game-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .cell {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 950;
            position: relative;
            color: rgba(0,0,0,0.3);
        }

        .cell-light { background: var(--secondary); }
        .cell-dark { background: var(--primary); }

        #game-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* High-Visibility Snakes and Ladders */
        .snake-path { 
            stroke: #2e7d32; /* Stronger Green */
            stroke-width: 10; 
            stroke-linecap: round; 
            fill: none;
            opacity: 0.9;
        }
        .ladder-path { 
            stroke: #1565c0; /* Stronger Blue */
            stroke-width: 14; 
            stroke-dasharray: 6, 8;
            fill: none;
            opacity: 0.8;
        }
        .ladder-side { 
            stroke: #1565c0; 
            stroke-width: 5; 
            fill: none;
        }

        .token {
            position: absolute;
            width: 30px; height: 30px;
            border-radius: 50%;
            z-index: 50;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .token.p1 { background: #e91e63; }
        .token.p2 { background: #673ab7; }

        .controls {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #dice-btn {
            width: 80px; height: 80px;
            background: #fff;
            border: none;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            font-size: 40px;
            transition: 0.2s;
        }
        #dice-btn:hover { transform: scale(1.1); box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        #dice-btn:active { transform: scale(0.95); }

        .top-bar {
            position: absolute; top: 30px;
            display: flex; gap: 15px;
        }
        .top-btn {
            background: #fff; border: none; padding: 10px 20px;
            border-radius: 100px; font-weight: 950; font-size: 10px;
            letter-spacing: 1px; color: #ff9800; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-transform: uppercase;
        }

        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .rolling { animation: roll 0.4s infinite linear; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1 class="game-title">SNAKE REALM</h1>
        <p class="game-subtitle">Classic Edition</p>

        <div id="p1-card" class="player-card active">
            <div class="avatar">🔴</div>
            <div class="player-info">
                <div class="player-name" id="p1-name">PLAYER 1</div>
                <div class="player-pos" id="p1-pos-text">Square: 1</div>
            </div>
        </div>

        <div id="p2-card" class="player-card">
            <div class="avatar">🟣</div>
            <div class="player-info">
                <div class="player-name" id="p2-name">ARCADE BOT</div>
                <div class="player-pos" id="p2-pos-text">Square: 1</div>
            </div>
        </div>

        <div style="flex: 1;"></div>
        <button onclick="window.location.href='index.html'" class="top-btn" style="width: 100%; padding: 15px;">Exit Game</button>
    </div>

    <div class="arena">
        <div class="top-bar">
            <button class="top-btn" onclick="resetGame()">Reset</button>
            <button class="top-btn" onclick="alert('Multiplayer Coming Soon!')">Multiplayer</button>
        </div>

        <div class="board-wrapper">
            <div class="board" id="board">
                <!-- Generated Cells -->
                <svg id="game-overlay"></svg>
            </div>
            <div id="p1-token" class="token p1"></div>
            <div id="p2-token" class="token p2"></div>
        </div>

        <div class="controls">
            <div style="text-align: right;">
                <div id="status-msg" style="font-weight: 950; font-size: 14px; color: #ff9800;">YOUR TURN</div>
                <div id="roll-res" style="font-size: 12px; color: #888; margin-top: 5px;">Roll the dice</div>
            </div>
            <button id="dice-btn">🎲</button>
        </div>
    </div>

    <script>
        const boardSize = 10;
        let currentPlayer = 1;
        let playerPositions = { 1: 1, 2: 1 };
        let isMoving = false;

        // Mapped from User Image
        const snakes = { 99: 19, 95: 76, 89: 68, 66: 45, 58: 41, 54: 32, 38: 3, 21: 2, 15: 5 };
        const ladders = { 4: 17, 12: 32, 42: 60, 49: 69, 52: 72, 62: 81, 74: 94 };

        function initBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let r = boardSize - 1; r >= 0; r--) {
                for (let c = 0; c < boardSize; c++) {
                    let col = (r % 2 === 0) ? (boardSize - 1 - c) : c;
                    let num = (r * boardSize) + col + 1;
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r + c) % 2 === 0 ? 'cell-dark' : 'cell-light'}`;
                    cell.id = `cell-${num}`;
                    cell.innerHTML = `<span>${num}</span>`;
                    board.appendChild(cell);
                }
            }
            // Wait for DOM to paint cells
            requestAnimationFrame(() => {
                setTimeout(drawConnections, 200);
            });
            updateTokenPositions(true);
        }

        function drawConnections() {
            const board = document.getElementById('board');
            const svg = document.getElementById('game-overlay');
            if (!board || !svg) return;

            const boardWidth = board.clientWidth || 600;
            const boardHeight = board.clientHeight || 600;

            // Sync SVG size and viewBox to board
            svg.setAttribute('width', boardWidth);
            svg.setAttribute('height', boardHeight);
            svg.setAttribute('viewBox', `0 0 ${boardWidth} ${boardHeight}`);
            svg.innerHTML = '';
            
            Object.keys(snakes).forEach(start => drawSnake(start, snakes[start]));
            Object.keys(ladders).forEach(start => drawLadder(start, ladders[start]));
        }

        function drawSnake(s, e) {
            const svg = document.getElementById('game-overlay');
            const pt1 = getCenter(`cell-${s}`);
            const pt2 = getCenter(`cell-${e}`);
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const midX = (pt1.x + pt2.x) / 2 + (Math.random() - 0.5) * 50;
            const midY = (pt1.y + pt2.y) / 2;
            path.setAttribute("d", `M${pt1.x},${pt1.y} Q${midX},${midY} ${pt2.x},${pt2.y}`);
            path.setAttribute("class", "snake-path");
            path.setAttribute("fill", "none");
            svg.appendChild(path);
        }

        function drawLadder(s, e) {
            const svg = document.getElementById('game-overlay');
            const pt1 = getCenter(`cell-${s}`);
            const pt2 = getCenter(`cell-${e}`);
            const dx = pt2.x - pt1.x;
            const dy = pt2.y - pt1.y;
            const angle = Math.atan2(dy, dx);
            const ox = Math.cos(angle + Math.PI/2) * 8;
            const oy = Math.sin(angle + Math.PI/2) * 8;

            const l1 = createLine(pt1.x + ox, pt1.y + oy, pt2.x + ox, pt2.y + oy, "ladder-side");
            const l2 = createLine(pt1.x - ox, pt1.y - oy, pt2.x - ox, pt2.y - oy, "ladder-side");
            const rungs = createLine(pt1.x, pt1.y, pt2.x, pt2.y, "ladder-path");
            
            svg.appendChild(l1); svg.appendChild(l2); svg.appendChild(rungs);
        }

        function createLine(x1, y1, x2, y2, cls) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", x1); l.setAttribute("y1", y1);
            l.setAttribute("x2", x2); l.setAttribute("y2", y2);
            l.setAttribute("class", cls);
            return l;
        }

        function getCenter(id) {
            const el = document.getElementById(id);
            const b = document.getElementById('board').getBoundingClientRect();
            const r = el.getBoundingClientRect();
            return { 
                x: r.left - b.left + (r.width / 2), 
                y: r.top - b.top + (r.height / 2) 
            };
        }

        function updateTokenPositions(instant = false) {
            [1, 2].forEach(p => {
                const pos = playerPositions[p];
                const pt = getCenter(`cell-${pos}`);
                const token = document.getElementById(`p${p}-token`);
                token.style.left = `${pt.x - 15}px`;
                token.style.top = `${pt.y - 15}px`;
                document.getElementById(`p${p}-pos-text`).innerText = `Square: ${pos}`;
            });
        }

        document.getElementById('dice-btn').onclick = () => { if (!isMoving && currentPlayer === 1) rollDice(); };

        function rollDice() {
            const btn = document.getElementById('dice-btn');
            btn.classList.add('rolling');
            setTimeout(() => {
                const roll = Math.floor(Math.random() * 6) + 1;
                btn.classList.remove('rolling');
                btn.innerText = ['⚀','⚁','⚂','⚃','⚄','⚅'][roll-1];
                document.getElementById('roll-res').innerText = `Rolled a ${roll}!`;
                movePlayer(roll);
            }, 800);
        }

        async function movePlayer(roll) {
            isMoving = true;
            let target = playerPositions[currentPlayer] + roll;
            if (target > 100) { nextTurn(); return; }
            
            for (let i = playerPositions[currentPlayer] + 1; i <= target; i++) {
                playerPositions[currentPlayer] = i;
                updateTokenPositions();
                await new Promise(r => setTimeout(r, 250));
            }

            if (snakes[target]) {
                playerPositions[currentPlayer] = snakes[target];
                await new Promise(r => setTimeout(r, 500));
                updateTokenPositions();
            } else if (ladders[target]) {
                playerPositions[currentPlayer] = ladders[target];
                await new Promise(r => setTimeout(r, 500));
                updateTokenPositions();
            }

            if (playerPositions[currentPlayer] === 100) {
                alert(`${currentPlayer === 1 ? 'YOU' : 'BOT'} WON!`);
                resetGame();
            } else {
                nextTurn();
            }
        }

        function nextTurn() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            isMoving = false;
            const msg = document.getElementById('status-msg');
            document.getElementById('p1-card').classList.toggle('active', currentPlayer === 1);
            document.getElementById('p2-card').classList.toggle('active', currentPlayer === 2);
            msg.innerText = currentPlayer === 1 ? "YOUR TURN" : "BOT IS PLAYING...";
            if (currentPlayer === 2) setTimeout(rollDice, 1000);
        }

        function resetGame() { playerPositions = { 1: 1, 2: 1 }; currentPlayer = 1; initBoard(); }
        window.onload = initBoard;
        window.onresize = drawConnections;
    </script>
</body>
</html>
