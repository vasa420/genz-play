<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE REALM | LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;950&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async></script>
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ffd700;
            --glass: rgba(0, 0, 0, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('snake_login_bg.png') center/cover no-repeat;
            filter: brightness(0.5) contrast(1.1);
            z-index: 1;
            animation: treeSway 10s infinite alternate ease-in-out;
        }

        @keyframes treeSway {
            from { transform: scale(1.05) rotate(0deg); }
            to { transform: scale(1.1) rotate(1deg); }
        }

        /* Rain Overlay */
        .rain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://raw.githubusercontent.com/Anand-Subramanian/Rainy-Effect/master/rain.png');
            opacity: 0.2; z-index: 2; pointer-events: none;
            animation: rainMove 0.5s linear infinite;
        }

        @keyframes rainMove {
            from { background-position: 0 0; }
            to { background-position: 50px 500px; }
        }

        /* Lightning Flash */
        .thunder {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0); z-index: 3; pointer-events: none;
        }

        .flash { animation: lightningFlash 0.4s ease-out; }

        @keyframes lightningFlash {
            0% { background: rgba(255,255,255,0); }
            10% { background: rgba(255,255,255,0.4); }
            100% { background: rgba(255,255,255,0); }
        }

        .login-card {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 60px;
            width: 90%; max-width: 450px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform: translateY(0);
            animation: float 4s infinite ease-in-out, flicker 10s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Ghostly Flicker */
        @keyframes flicker {
            0%, 100% { opacity: 1; filter: brightness(1); }
            5% { opacity: 0.8; filter: brightness(0.8); }
            10% { opacity: 0.9; filter: brightness(1.2); }
            15% { opacity: 0.7; filter: brightness(0.7); }
            20% { opacity: 1; filter: brightness(1); }
            80% { opacity: 1; filter: brightness(1); }
            85% { opacity: 0.9; filter: brightness(0.8); }
            90% { opacity: 0.8; filter: brightness(1.5); }
        }

        /* Falling Leaves */
        .leaf {
            position: fixed; width: 15px; height: 15px;
            background: #4a5d23; border-radius: 0 10px;
            z-index: 5; pointer-events: none;
            opacity: 0.6;
            animation: leafFall 10s linear infinite;
        }

        @keyframes leafFall {
            0% { transform: translate(0, -10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translate(100px, 110vh) rotate(360deg); opacity: 0; }
        }

        .logo { font-size: 60px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--primary)); }

        h1 {
            color: #fff; font-size: 32px; font-weight: 950;
            letter-spacing: 5px; text-transform: uppercase;
            margin-bottom: 10px;
        }

        p { color: #888; font-size: 11px; letter-spacing: 3px; margin-bottom: 50px; }

        .google-btn-wrapper {
            margin: 0 auto; width: fit-content;
            padding: 2px; border-radius: 100px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
            margin-bottom: 20px;
        }

        #google-login-container {
            border-radius: 100px; overflow: hidden;
            transition: 0.3s;
        }

        #google-login-container:hover { transform: scale(1.05); cursor: pointer; }

        .guest-btn {
            background: rgba(255,255,255,0.05); color: #888;
            border: 1px solid var(--border);
            padding: 15px 40px; border-radius: 100px;
            font-size: 11px; font-weight: 900; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        .guest-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: #fff; }

        .back-btn {
            position: absolute; top: 40px; left: 40px;
            color: #666; font-size: 12px; font-weight: 950;
            letter-spacing: 2px; text-decoration: none;
            text-transform: uppercase; transition: 0.3s;
        }

        .back-btn:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="rain"></div>
    <div id="thunder" class="thunder"></div>
    <a href="index.html" class="back-btn">← Back to Hub</a>

    <div class="login-card">
        <div class="logo" id="snake-logo">🐍</div>
        <h1>Snake Realm</h1>
        <p>Tactical Arena Access</p>

        <div class="google-btn-wrapper">
            <div id="google-login-container">
                <div id="g_id_onload"
                     data-client_id="731634414121-6nbfdnaetc5clc54h93ahrh9j17km0pl.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleLogin"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
            </div>
        </div>

        <button class="guest-btn" onclick="enterAsGuest()">Enter as Guest</button>
        
        <div id="audio-prompt" style="margin-top: 30px; font-size: 10px; color: #555; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;" onclick="toggleAudio()">
            Click to Wake the Forest 🌲
        </div>
    </div>

    <!-- Sequenced Horror Soundscape (Absolutely No Instruments) -->
    <audio id="snd-wind" loop preload="auto" crossorigin="anonymous">
        <source src="https://raw.githubusercontent.com/rafael-p-l/horror-music/main/wind.mp3" type="audio/mpeg">
    </audio>
    <audio id="snd-thunder" preload="auto" crossorigin="anonymous">
        <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_b333a5980b.mp3" type="audio/mpeg">
    </audio>
    <audio id="snd-shots" preload="auto" crossorigin="anonymous">
        <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_7313a29410.mp3" type="audio/mpeg">
    </audio>
    <audio id="snd-screams" preload="auto" crossorigin="anonymous">
        <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_291a89c362.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Leaf Creation (Always active)
        function createLeaf() {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = (Math.random() * 5 + 5) + 's';
            leaf.style.background = `hsl(${Math.random() * 40 + 80}, 40%, 30%)`;
            document.body.appendChild(leaf);
            setTimeout(() => leaf.remove(), 10000);
        }
        setInterval(createLeaf, 2000);

        let audioActive = false;
        let sequenceTimer = null;
        
        function toggleAudio() {
            const wind = document.getElementById('snd-wind');
            const thunder = document.getElementById('snd-thunder');
            const shots = document.getElementById('snd-shots');
            const screams = document.getElementById('snd-screams');
            const prompt = document.getElementById('audio-prompt');
            
            if (!audioActive) {
                audioActive = true;
                prompt.innerText = "SEQUENCING HORROR... 🌑";
                prompt.style.color = "var(--primary)";
                startSequence();
            } else {
                audioActive = false;
                clearTimeout(sequenceTimer);
                [wind, thunder, shots, screams].forEach(s => s.pause());
                prompt.innerText = "REALM SILENCED ❄️";
                prompt.style.color = "#555";
            }
        }

        function startSequence() {
            if (!audioActive) return;
            
            const wind = document.getElementById('snd-wind');
            const thunder = document.getElementById('snd-thunder');
            const shots = document.getElementById('snd-shots');
            const screams = document.getElementById('snd-screams');
            const prompt = document.getElementById('audio-prompt');

            // --- SEGMENT 1: 0-10s WIND ---
            prompt.innerText = "SURGING WIND... 🌬️";
            [thunder, shots, screams].forEach(s => { s.pause(); s.currentTime = 0; });
            wind.volume = 1.0;
            wind.play();

            sequenceTimer = setTimeout(() => {
                if (!audioActive) return;

                // --- SEGMENT 2: 10-20s THUNDER ---
                prompt.innerText = "STORM AWAKENING... ⛈️";
                wind.pause();
                thunder.volume = 1.0;
                thunder.play();
                startLightningSegment();

                sequenceTimer = setTimeout(() => {
                    if (!audioActive) return;

                    // --- SEGMENT 3: 20-30s CHAOS ---
                    prompt.innerText = "CHAOS ERUPTING... 💀";
                    thunder.pause();
                    shots.volume = 1.0;
                    screams.volume = 0.8;
                    shots.play();
                    screams.play();

                    sequenceTimer = setTimeout(() => {
                        if (!audioActive) return;
                        startSequence(); // LOOP BACK
                    }, 10000);
                }, 10000);
            }, 10000);
        }

        let lightningActive = false;
        function startLightningSegment() {
            if (!audioActive) return;
            lightningActive = true;
            
            const runLightning = () => {
                if (!lightningActive || !audioActive) return;
                const flash = document.getElementById('thunder');
                flash.classList.add('flash');
                setTimeout(() => flash.classList.remove('flash'), 500);
                setTimeout(runLightning, Math.random() * 2000 + 500);
            };
            
            runLightning();
            setTimeout(() => { lightningActive = false; }, 10000);
        }

        function handleGoogleLogin(response) {
            const payload = decodeJwtResponse(response.credential);
            localStorage.setItem('playerName', payload.name);
            localStorage.setItem('playerAvatar', payload.picture);
            enterGame();
        }

        function decodeJwtResponse(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function enterAsGuest() {
            localStorage.setItem('playerName', 'Tactical Guest');
            enterGame();
        }

        function enterGame() {
            window.location.href = 'snake_ladder.html';
        }
    </script>
</body>
</html>
