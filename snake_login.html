<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE REALM | LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;950&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async></script>
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ffd700;
            --glass: rgba(0, 0, 0, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #gatekeeper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.8s;
        }
        #gatekeeper button {
            background: none; border: 2px solid var(--primary); color: #fff;
            padding: 25px 60px; font-size: 20px; font-weight: 950; letter-spacing: 5px;
            text-transform: uppercase; cursor: pointer; border-radius: 100px;
            box-shadow: 0 0 40px var(--primary); transition: 0.3s;
        }
        #gatekeeper button:hover { background: var(--primary); color: #000; transform: scale(1.1); }

        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('snake_login_bg.png') center/cover no-repeat;
            filter: brightness(0.5) contrast(1.1);
            z-index: 1;
            animation: treeSway 15s infinite alternate ease-in-out;
        }

        @keyframes treeSway {
            from { transform: scale(1) rotate(0deg); }
            to { transform: scale(1.1) rotate(0.5deg); }
        }

        .rain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://raw.githubusercontent.com/Anand-Subramanian/Rainy-Effect/master/rain.png');
            opacity: 0.1; z-index: 2; pointer-events: none;
            animation: rainMove 0.5s linear infinite;
        }

        @keyframes rainMove {
            from { background-position: 0 0; }
            to { background-position: 20px 200px; }
        }

        .thunder {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0); z-index: 3; pointer-events: none;
        }

        .flash { animation: lightningFlash 0.4s ease-out; }

        @keyframes lightningFlash {
            0% { background: rgba(255,255,255,0); }
            10% { background: rgba(255,255,255,0.4); }
            100% { background: rgba(255,255,255,0); }
        }

        .login-card {
            position: relative; z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 60px;
            width: 90%; max-width: 450px;
            text-align: center;
            box-shadow: 0 30px 100px rgba(0,0,0,0.8);
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo { font-size: 70px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--primary)); }
        h1 { color: #fff; font-size: 32px; font-weight: 950; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 15px; }
        p { color: #888; font-size: 11px; letter-spacing: 3px; margin-bottom: 40px; }

        .google-btn-wrapper {
            margin: 0 auto; width: fit-content;
            padding: 2px; border-radius: 100px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
            margin-bottom: 25px;
        }

        #google-login-container { border-radius: 100px; overflow: hidden; transition: 0.3s; }

        .guest-btn {
            background: rgba(255,255,255,0.05); color: #888;
            border: 1px solid var(--border);
            padding: 15px 40px; border-radius: 100px;
            font-size: 11px; font-weight: 950; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .guest-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: #fff; }

        .status-text {
            margin-top: 30px; font-size: 10px; color: #555;
            letter-spacing: 2px; text-transform: uppercase;
        }

        .volume-meter {
            width: 100px; height: 3px; background: #111; margin: 15px auto;
            border-radius: 10px; overflow: hidden;
        }
        .volume-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }

        .back-btn {
            position: absolute; top: 40px; left: 40px;
            color: #666; font-size: 12px; font-weight: 950;
            letter-spacing: 2px; text-decoration: none;
            text-transform: uppercase; transition: 0.3s; z-index: 20;
        }
    </style>
</head>
<body>
    <div id="gatekeeper">
        <div class="logo">🐍</div>
        <h1>SNAKE REALM</h1>
        <button onclick="unlockRealm()">ENTER ARENA</button>
    </div>

    <div class="bg"></div>
    <div class="rain"></div>
    <div id="thunder-vis" class="thunder"></div>
    <a href="index.html" class="back-btn">← Back to Hub</a>

    <div class="login-card">
        <div class="logo">🐍</div>
        <h1>SNAKE REALM</h1>
        <p>TACTICAL ACCESS ARENA</p>

        <div class="google-btn-wrapper">
            <div id="google-login-container">
                <div id="g_id_onload"
                     data-client_id="731634414121-6nbfdnaetc5clc54h93ahrh9j17km0pl.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleLogin"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
            </div>
        </div>

        <button class="guest-btn" onclick="enterAsGuest()">Enter as Guest</button>
        <div id="status" class="status-text">INITIALIZING SOUNDSCAPE...</div>
        <div class="volume-meter"><div id="vol-fill" class="volume-fill"></div></div>
    </div>

    <!-- AUDIO CDN (GOOGLE STORAGE) -->
    <audio id="snd-wind" loop preload="auto" crossorigin="anonymous">
        <source src="https://storage.googleapis.com/codeskulptor-assets/EerieSound.mp3" type="audio/mpeg">
    </audio>
    <audio id="snd-thunder" preload="auto" crossorigin="anonymous">
        <source src="https://storage.googleapis.com/codeskulptor-assets/Collision8-Bit.mp3" type="audio/mpeg">
    </audio>
    <audio id="snd-chaos" preload="auto" crossorigin="anonymous">
        <source src="https://storage.googleapis.com/codeskulptor-assets/paws0.mp3" type="audio/mpeg">
    </audio>

    <script>
        let audioActive = false;
        let timer = null;

        function unlockRealm() {
            // PLAY IMMEDIATELY on click to satisfy strict browser policies
            playSafe('snd-wind', 1.0); 
            
            const gk = document.getElementById('gatekeeper');
            gk.style.opacity = '0';
            setTimeout(() => {
                gk.style.display = 'none';
                audioActive = true;
                startMainSequence(true); // true means skip the first wind start since we just did it
            }, 800);
        }

        function playSafe(id, vol = 1.0) {
            const el = document.getElementById(id);
            if (!el) return;
            el.volume = vol;
            document.getElementById('vol-fill').style.width = (vol * 100) + '%';
            el.play().then(() => {
                document.getElementById('status').style.color = "var(--primary)";
            }).catch(e => {
                console.error(e);
                document.getElementById('status').innerText = "AUDIO BLOCKED: CLICK HERE TO UNMUTE 🔊";
                document.getElementById('status').style.cursor = "pointer";
                document.getElementById('status').onclick = () => { unlockRealm(); };
            });
        }

        function stopSafe(id) {
            const el = document.getElementById(id);
            if (el) el.pause();
        }

        function startMainSequence(skipFirst = false) {
            if (!audioActive) return;
            const status = document.getElementById('status');
            
            if (!skipFirst) {
                // 0-10s WIND
                status.innerText = "PHASE 1: WIND... 🌬️";
                stopSafe('snd-thunder');
                stopSafe('snd-chaos');
                playSafe('snd-wind', 1.0);
            } else {
                status.innerText = "PHASE 1: WIND... 🌬️";
            }

            timer = setTimeout(() => {
                if (!audioActive) return;

                // 10-20s THUNDER
                status.innerText = "PHASE 2: THUNDER... ⛈️";
                stopSafe('snd-wind');
                playSafe('snd-thunder', 1.0);
                triggerLightning();

                timer = setTimeout(() => {
                    if (!audioActive) return;

                    // 20-30s CHAOS
                    status.innerText = "PHASE 3: CHAOS... 💀";
                    stopSafe('snd-thunder');
                    playSafe('snd-chaos', 1.0);

                    timer = setTimeout(() => {
                        if (audioActive) startMainSequence();
                    }, 10000);
                }, 10000);
            }, 10000);
        }

        function triggerLightning() {
            let hits = 0;
            const h = setInterval(() => {
                const v = document.getElementById('thunder-vis');
                v.classList.add('flash');
                setTimeout(() => v.classList.remove('flash'), 400);
                hits++;
                if (hits > 3 || !audioActive) clearInterval(h);
            }, 2500);
        }

        function handleGoogleLogin(response) {
            audioActive = false;
            window.location.href = 'snake_ladder.html';
        }

        function enterAsGuest() {
            audioActive = false;
            window.location.href = 'snake_ladder.html';
        }
    </script>
</body>
</html>
