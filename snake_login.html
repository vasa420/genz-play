<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE REALM | LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;950&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async></script>
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ffd700;
            --glass: rgba(0, 0, 0, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('snake_realm_forest_bg.png') center/cover no-repeat;
            filter: brightness(0.5) contrast(1.1);
            z-index: 1;
            animation: treeSway 20s infinite alternate ease-in-out;
        }

        @keyframes treeSway {
            from { transform: scale(1.05) rotate(0deg); }
            to { transform: scale(1.15) rotate(1deg); }
        }

        .rain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://raw.githubusercontent.com/Anand-Subramanian/Rainy-Effect/master/rain.png');
            opacity: 0.15; z-index: 2; pointer-events: none;
            animation: rainMove 0.5s linear infinite;
        }

        @keyframes rainMove {
            from { background-position: 0 0; }
            to { background-position: 50px 500px; }
        }

        .thunder {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0); z-index: 3; pointer-events: none;
        }

        .flash { animation: lightningFlash 0.4s ease-out; }

        @keyframes lightningFlash {
            0% { background: rgba(255,255,255,0); }
            10% { background: rgba(255,255,255,0.4); }
            100% { background: rgba(255,255,255,0); }
        }

        .leaf {
            position: fixed; width: 12px; height: 12px;
            background: #4a5d23; border-radius: 0 10px;
            z-index: 5; pointer-events: none; opacity: 0.6;
            animation: leafFall 12s linear infinite;
        }

        @keyframes leafFall {
            0% { transform: translate(0, -10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translate(150px, 110vh) rotate(540deg); opacity: 0; }
        }

        .login-card {
            position: relative; z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px;
            width: 90%; max-width: 380px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            animation: float 5s infinite ease-in-out;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo { font-size: 80px; margin-bottom: 25px; filter: drop-shadow(0 0 20px var(--primary)); }
        h1 { color: #fff; font-size: 38px; font-weight: 950; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 15px; }
        p { color: #888; font-size: 12px; letter-spacing: 4px; margin-bottom: 50px; }

        .google-btn-wrapper {
            margin: 0 auto; width: fit-content;
            padding: 2px; border-radius: 100px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.3);
            margin-bottom: 25px;
        }

        #google-login-container { border-radius: 100px; overflow: hidden; transition: 0.3s; }
        #google-login-container:hover { transform: scale(1.05); cursor: pointer; }

        .back-btn {
            position: absolute; top: 40px; left: 40px;
            color: #666; font-size: 14px; font-weight: 950;
            letter-spacing: 3px; text-decoration: none;
            text-transform: uppercase; transition: 0.3s; z-index: 20;
        }
        .back-btn:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="rain"></div>
    <div id="thunder-vis" class="thunder"></div>
    <a href="index.html" class="back-btn">← Back to Hub</a>

    <div class="login-card">
        <div class="logo" style="font-size: 60px;">🐍</div>
        <h1 style="font-size: 28px;">SNAKE REALM</h1>
        <p style="margin-bottom: 30px;">IDENTITY AUTHENTICATION</p>

        <div class="google-btn-wrapper" style="margin-bottom: 10px;">
            <div id="google-login-container">
                <div id="g_id_onload"
                     data-client_id="731634414121-6nbfdnaetc5clc54h93ahrh9j17km0pl.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleLogin"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
            </div>
        </div>
    </div>

    <script>
        // Leaf Creation
        setInterval(() => {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = (Math.random() * 5 + 7) + 's';
            leaf.style.background = `hsl(${Math.random() * 40 + 80}, 40%, 30%)`;
            document.body.appendChild(leaf);
            setTimeout(() => leaf.remove(), 12000);
        }, 2000);

        // Enhanced Lightning Visuals
        setInterval(() => {
            if (Math.random() > 0.7) return; 
            const v = document.getElementById('thunder-vis');
            v.classList.add('flash');
            setTimeout(() => v.classList.remove('flash'), 150 + Math.random() * 300);
        }, 8000);

        function handleGoogleLogin(response) {
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(window.atob(base64));
            localStorage.setItem('playerName', payload.name);
            window.location.href = 'snake_ladder.html';
        }
    </script>
</body>
</html>
