<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE REALM | LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;950&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async></script>
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ffd700;
            --glass: rgba(0, 0, 0, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Gatekeeper Overlay (To fix browser audio block) */
        #gatekeeper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #gatekeeper button {
            background: none; border: 2px solid var(--primary); color: #fff;
            padding: 25px 60px; font-size: 20px; font-weight: 950; letter-spacing: 10px;
            text-transform: uppercase; cursor: pointer; border-radius: 100px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3); transition: 0.4s;
            margin-top: 30px;
        }
        #gatekeeper button:hover { background: var(--primary); color: #000; transform: scale(1.1); box-shadow: 0 0 80px var(--primary); }

        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('snake_login_bg.png') center/cover no-repeat;
            filter: brightness(0.5) contrast(1.1);
            z-index: 1;
            animation: treeSway 20s infinite alternate ease-in-out;
        }

        @keyframes treeSway {
            from { transform: scale(1.05) rotate(0deg); }
            to { transform: scale(1.15) rotate(1deg); }
        }

        .rain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://raw.githubusercontent.com/Anand-Subramanian/Rainy-Effect/master/rain.png');
            opacity: 0.15; z-index: 2; pointer-events: none;
            animation: rainMove 0.5s linear infinite;
        }

        @keyframes rainMove {
            from { background-position: 0 0; }
            to { background-position: 50px 500px; }
        }

        .thunder {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0); z-index: 3; pointer-events: none;
        }

        .flash { animation: lightningFlash 0.4s ease-out; }

        @keyframes lightningFlash {
            0% { background: rgba(255,255,255,0); }
            10% { background: rgba(255,255,255,0.4); }
            100% { background: rgba(255,255,255,0); }
        }

        .leaf {
            position: fixed; width: 12px; height: 12px;
            background: #4a5d23; border-radius: 0 10px;
            z-index: 5; pointer-events: none; opacity: 0.6;
            animation: leafFall 12s linear infinite;
        }

        @keyframes leafFall {
            0% { transform: translate(0, -10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translate(150px, 110vh) rotate(540deg); opacity: 0; }
        }

        .login-card {
            position: relative; z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 70px;
            width: 90%; max-width: 480px;
            text-align: center;
            box-shadow: 0 50px 120px rgba(0,0,0,0.9);
            animation: float 5s infinite ease-in-out, flicker 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; filter: brightness(1); }
            5% { opacity: 0.9; filter: brightness(0.8); }
            10% { opacity: 1; filter: brightness(1.2); }
            15% { opacity: 0.8; filter: brightness(0.7); }
            80% { opacity: 1; filter: brightness(1); }
        }

        .logo { font-size: 80px; margin-bottom: 25px; filter: drop-shadow(0 0 20px var(--primary)); }
        h1 { color: #fff; font-size: 38px; font-weight: 950; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 15px; }
        p { color: #888; font-size: 12px; letter-spacing: 4px; margin-bottom: 50px; }

        .google-btn-wrapper {
            margin: 0 auto; width: fit-content;
            padding: 2px; border-radius: 100px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.3);
            margin-bottom: 25px;
        }

        #google-login-container { border-radius: 100px; overflow: hidden; transition: 0.3s; }
        #google-login-container:hover { transform: scale(1.05); cursor: pointer; }

        .guest-btn {
            background: rgba(255,255,255,0.05); color: #888;
            border: 1px solid var(--border);
            padding: 18px 50px; border-radius: 100px;
            font-size: 12px; font-weight: 950; letter-spacing: 3px;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .guest-btn:hover { background: rgba(255,255,255,0.15); color: #fff; border-color: #fff; }

        .status-text {
            margin-top: 40px; font-size: 10px; color: #555; font-weight: 950;
            letter-spacing: 3px; text-transform: uppercase; transition: 0.5s;
        }

        .back-btn {
            position: absolute; top: 40px; left: 40px;
            color: #666; font-size: 14px; font-weight: 950;
            letter-spacing: 3px; text-decoration: none;
            text-transform: uppercase; transition: 0.3s; z-index: 20;
        }
        .back-btn:hover { color: #fff; }
    </style>
</head>
<body>
    <!-- Gatekeeper: Forces a powerful browser interaction -->
    <div id="gatekeeper">
        <div class="logo">🐍</div>
        <h1>SNAKE REALM</h1>
        <button onclick="unlockRealm()">ENTER THE ARENA</button>
        <p style="margin-top: 30px; opacity: 0.5;">PREPARING SONIC LAYERS</p>
    </div>

    <div class="bg"></div>
    <div class="rain"></div>
    <div id="thunder-vis" class="thunder"></div>
    <a href="index.html" class="back-btn">← Back to Hub</a>

    <div class="login-card">
        <div class="logo">🐍</div>
        <h1>SNAKE REALM</h1>
        <p>TACTICAL ACCESS ARENA</p>

        <div class="google-btn-wrapper">
            <div id="google-login-container">
                <div id="g_id_onload"
                     data-client_id="731634414121-6nbfdnaetc5clc54h93ahrh9j17km0pl.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleLogin"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
            </div>
        </div>

        <button class="guest-btn" onclick="enterAsGuest()">Enter as Guest</button>
        <div id="status" class="status-text">SONIC REALM INITIALIZING...</div>
    </div>

    <!-- Master Soundscape Controller -->
    <audio id="snd-wind" loop preload="auto" crossorigin="anonymous">
        <source src="https://audio-samples.github.io/samples/mp3/wind/wind-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="snd-thunder" preload="auto" crossorigin="anonymous">
        <source src="https://audio-samples.github.io/samples/mp3/storm/storm-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="snd-chaos" preload="auto" crossorigin="anonymous">
        <source src="https://raw.githubusercontent.com/rafael-p-l/horror-music/main/gunshot.mp3" type="audio/mpeg">
    </audio>

    <script>
        let audioActive = false;
        let masterTimer = null;

        function unlockRealm() {
            // This click satisfies browser audio policies
            const gk = document.getElementById('gatekeeper');
            gk.style.opacity = '0';
            setTimeout(() => {
                gk.style.display = 'none';
                audioActive = true;
                startLogicLoop();
            }, 1000);
        }

        // Always running visual
        setInterval(() => {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = (Math.random() * 5 + 7) + 's';
            leaf.style.background = `hsl(${Math.random() * 40 + 80}, 40%, 30%)`;
            document.body.appendChild(leaf);
            setTimeout(() => leaf.remove(), 12000);
        }, 1500);

        function playSafe(id, vol = 1.0) {
            const el = document.getElementById(id);
            if (!el) return;
            el.volume = vol;
            el.currentTime = 0;
            const p = el.play();
            if (p) p.catch(() => console.log("Blocked: " + id));
        }

        function stopSafe(id) {
            const el = document.getElementById(id);
            if (el) el.pause();
        }

        function startLogicLoop() {
            if (!audioActive) return;
            const status = document.getElementById('status');
            
            // --- SEGMENT 1: 0-10s WIND ---
            status.innerText = "[ 0-10s ] HEAVY WIND... 🌬️";
            status.style.color = "var(--primary)";
            stopSafe('snd-thunder');
            stopSafe('snd-chaos');
            playSafe('snd-wind', 1.0);

            masterTimer = setTimeout(() => {
                if (!audioActive) return;

                // --- SEGMENT 2: 10-20s THUNDER ---
                status.innerText = "[ 10-20s ] THUNDERSTORM... ⛈️";
                stopSafe('snd-wind');
                playSafe('snd-thunder', 1.0);
                startLightningVis();

                masterTimer = setTimeout(() => {
                    if (!audioActive) return;

                    // --- SEGMENT 3: 20-30s CHAOS ---
                    status.innerText = "[ 20-30s ] CHAOS ERUPTS... 💀";
                    stopSafe('snd-thunder');
                    playSafe('snd-chaos', 1.0);

                    masterTimer = setTimeout(() => {
                        if (audioActive) startLogicLoop(); // Loop back
                    }, 10000);
                }, 10000);
            }, 10000);
        }

        function startLightningVis() {
            let count = 0;
            const i = setInterval(() => {
                const v = document.getElementById('thunder-vis');
                v.classList.add('flash');
                setTimeout(() => v.classList.remove('flash'), 400);
                count++;
                if (count > 4 || !audioActive) clearInterval(i);
            }, 2000);
        }

        function handleGoogleLogin(response) {
            const payload = decodeJwtResponse(response.credential);
            localStorage.setItem('playerName', payload.name);
            localStorage.setItem('playerAvatar', payload.picture);
            enterGame();
        }

        function decodeJwtResponse(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function enterAsGuest() {
            localStorage.setItem('playerName', 'Tactical Guest');
            enterGame();
        }

        function enterGame() {
            audioActive = false; // Stop audio before leave
            window.location.href = 'snake_ladder.html';
        }
    </script>
</body>
</html>
