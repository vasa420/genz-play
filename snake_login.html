<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE REALM | LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;950&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async></script>
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ffd700;
            --glass: rgba(0, 0, 0, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('snake_realm_forest_bg.png') center/cover no-repeat;
            filter: brightness(0.5) contrast(1.1);
            z-index: 1;
            animation: treeSway 20s infinite alternate ease-in-out;
        }

        @keyframes treeSway {
            from { transform: scale(1.05) rotate(0deg); }
            to { transform: scale(1.15) rotate(1deg); }
        }

        .rain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://raw.githubusercontent.com/Anand-Subramanian/Rainy-Effect/master/rain.png');
            opacity: 0.15; z-index: 2; pointer-events: none;
            animation: rainMove 0.5s linear infinite;
        }

        @keyframes rainMove {
            from { background-position: 0 0; }
            to { background-position: 50px 500px; }
        }

        .thunder {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0); z-index: 3; pointer-events: none;
        }

        .flash { animation: lightningFlash 0.4s ease-out; }

        @keyframes lightningFlash {
            0% { background: rgba(255,255,255,0); }
            10% { background: rgba(255,255,255,0.4); }
            100% { background: rgba(255,255,255,0); }
        }

        .leaf {
            position: fixed; width: 12px; height: 12px;
            background: #4a5d23; border-radius: 0 10px;
            z-index: 5; pointer-events: none; opacity: 0.6;
            animation: leafFall 12s linear infinite;
        }

        @keyframes leafFall {
            0% { transform: translate(0, -10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translate(150px, 110vh) rotate(540deg); opacity: 0; }
        }

        .login-card {
            position: relative; z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px;
            width: 90%; max-width: 380px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            animation: float 5s infinite ease-in-out;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Blood & Zoom Transition */
        .blood-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #660000 150%);
            z-index: 100; opacity: 0; pointer-events: none;
            transition: 1s ease-in;
        }

        .blood-splatter {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://pngimg.com/uploads/blood/blood_PNG6108.png') center/cover;
            z-index: 101; opacity: 0; pointer-events: none; mix-blend-mode: multiply;
        }

        .zooming .bg { transform: scale(3) !important; transition: 2.5s cubic-bezier(1, 0, 1, 1) !important; filter: brightness(2) contrast(2) !important; }
        .zooming .login-card { transform: scale(0) rotate(5deg); opacity: 0; filter: blur(20px); }
        .active-blood .blood-overlay { opacity: 1; }
        .active-blood .blood-splatter { opacity: 0.8; animation: splatter 2s forwards; }

        @keyframes splatter {
            from { transform: scale(1.5); }
            to { transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .logo { font-size: 80px; margin-bottom: 25px; filter: drop-shadow(0 0 20px var(--primary)); }
        h1 { color: #fff; font-size: 38px; font-weight: 950; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 15px; }
        p { color: #888; font-size: 12px; letter-spacing: 4px; margin-bottom: 50px; }

        .google-btn-wrapper {
            margin: 0 auto; width: fit-content;
            padding: 2px; border-radius: 100px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.3);
            margin-bottom: 25px;
        }

        #google-login-container { border-radius: 100px; overflow: hidden; transition: 0.3s; }
        #google-login-container:hover { transform: scale(1.05); cursor: pointer; }

        .back-btn {
            position: absolute; top: 40px; left: 40px;
            color: #666; font-size: 14px; font-weight: 950;
            letter-spacing: 3px; text-decoration: none;
            text-transform: uppercase; transition: 0.3s; z-index: 20;
        }
        .audio-status {
            font-size: 9px; font-weight: 950; letter-spacing: 2px;
            color: var(--primary); text-transform: uppercase;
            text-shadow: 0 0 10px var(--primary);
        }

        .mute-btn {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary); width: 50px; height: 50px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: 0.3s;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .mute-btn:hover { 
            background: var(--primary); color: #000;
            box-shadow: 0 0 30px var(--primary);
            transform: scale(1.1);
        }

        .mute-btn.muted { 
            color: #ff3333; border-color: #ff3333; 
            background: rgba(255, 51, 51, 0.1);
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="rain"></div>
    <div id="thunder-vis" class="thunder"></div>
    <div id="blood" class="blood-overlay"></div>
    <div id="splatter" class="blood-splatter"></div>
    
    <div class="audio-control" style="position: absolute; top: 40px; right: 40px; z-index: 1000; display: flex; align-items: center; gap: 15px;">
        <span class="audio-status" id="audio-status" style="display: none;">Active</span>
        <button id="mute-btn" class="mute-btn" onclick="toggleAudio()" title="Toggle Atmosphere">🔊</button>
    </div>

    <a href="index.html" class="back-btn">← Back to Hub</a>

    <audio id="bg-music" src="samuelfjohanns-creepy-ambient-7539.mp3" loop></audio>

    <div class="login-card">
        <div class="logo" style="font-size: 60px;">🐍</div>
        <h1 style="font-size: 28px;">SNAKE REALM</h1>
        <p style="margin-bottom: 30px;">IDENTITY AUTHENTICATION</p>

        <div class="google-btn-wrapper" style="margin-bottom: 10px;">
            <div id="google-login-container">
                <div id="g_id_onload"
                     data-client_id="731634414121-6nbfdnaetc5clc54h93ahrh9j17km0pl.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleLogin"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
            </div>
        </div>
    </div>

    <script>
        // Leaf Creation
        setInterval(() => {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = (Math.random() * 5 + 7) + 's';
            leaf.style.background = `hsl(${Math.random() * 40 + 80}, 40%, 30%)`;
            document.body.appendChild(leaf);
            setTimeout(() => leaf.remove(), 12000);
        }, 2000);

        // Enhanced Lightning Visuals
        setInterval(() => {
            if (Math.random() > 0.7) return; 
            const v = document.getElementById('thunder-vis');
            v.classList.add('flash');
            setTimeout(() => v.classList.remove('flash'), 150 + Math.random() * 300);
        }, 8000);

        // Audio Logic
        const music = document.getElementById('bg-music');
        const muteBtn = document.getElementById('mute-btn');
        const statusText = document.getElementById('audio-status');
        let isMuted = false;

        function toggleAudio() {
            if (music.paused) {
                music.play().catch(e => console.error("Playback failed:", e));
                isMuted = false;
            } else {
                isMuted = !isMuted;
                music.muted = isMuted;
            }
            updateAudioUI();
        }

        function updateAudioUI() {
            muteBtn.innerHTML = isMuted ? '🔇' : '🔊';
            muteBtn.classList.toggle('muted', isMuted);
            statusText.innerText = isMuted ? 'Atmosphere: Muted' : 'Atmosphere: Active';
            statusText.style.color = isMuted ? '#ff3333' : '#00f2ff';
        }

        // Broad interaction trigger to bypass browser blocks
        ['click', 'keydown', 'touchstart'].forEach(evt => {
            window.addEventListener(evt, () => {
                if (music.paused && !isMuted) {
                    music.play().then(() => {
                        updateAudioUI();
                    }).catch(e => console.log("Playback blocked:", e));
                }
            }, { once: true });
        });

        music.addEventListener('error', (e) => {
            statusText.innerText = 'Atmosphere: Error';
            statusText.style.color = '#ff3333';
        });

        function handleGoogleLogin(response) {
            const payload = decodeJwtResponse(response.credential);
            localStorage.setItem('playerName', payload.name);
            localStorage.setItem('playerAvatar', payload.picture);
            enterGame();
        }

        function decodeJwtResponse(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function enterAsGuest() {
            localStorage.setItem('playerName', 'Tactical Guest');
            enterGame();
        }

        function enterGame() {
            window.location.href = 'snake_ladder.html';
        }
    </script>
</body>
</html>
