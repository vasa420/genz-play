<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Realm - Cinematic Initiation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #ff4d4d;
            --blue: #0080ff;
            --yellow: #ffd633;
            --green: #2eb82e;
            --bg: #020202;
            --gold: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Deep Cinematic Background */
        .cinematic-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: -2;
            filter: brightness(0.5);
        }

        .cinematic-light {
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(from 180deg at 50% 50%, transparent 0deg, rgba(255,255,255,0.02) 90deg, transparent 180deg);
            animation: lightRotate 20s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes lightRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 3D Board & Camera */
        .scene {
            perspective: 2000px;
            margin-bottom: 20px;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.05));
        }

        .board-container {
            width: 320px;
            height: 320px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(60deg) rotateZ(45deg);
            animation: cameraEntrance 4s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                       boardIdle 8s ease-in-out infinite 4s,
                       cameraShake 0.1s infinite 2.5s 1.5s; /* Shake during dice drop */
        }

        @keyframes cameraEntrance {
            0% { transform: rotateX(85deg) rotateZ(180deg) translateZ(-800px); opacity: 0; filter: blur(10px); }
            40% { opacity: 1; filter: blur(0); }
            100% { transform: rotateX(60deg) rotateZ(45deg) translateZ(0); opacity: 1; }
        }

        @keyframes boardIdle {
            0%, 100% { transform: rotateX(60deg) rotateZ(45deg) translateZ(0); }
            50% { transform: rotateX(55deg) rotateZ(48deg) translateZ(30px); }
        }

        @keyframes cameraShake {
            0%, 100% { margin-left: 0; margin-top: 0; }
            25% { margin-left: -2px; margin-top: 1px; }
            50% { margin-left: 2px; margin-top: -1px; }
            75% { margin-left: -1px; margin-top: 2px; }
        }

        .ludo-grid {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            background: #111;
            border: 10px solid #222;
            box-shadow: 0 0 120px rgba(0,0,0,1), inset 0 0 60px rgba(255,255,255,0.03);
            transform-style: preserve-3d;
        }

        /* Tactical Cells */
        .cell { border: 1px solid rgba(255,255,255,0.03); background: #0a0a0a; }
        .base { 
            grid-column: span 6; grid-row: span 6; 
            border: 8px solid #111; 
            position: relative; 
            transform: translateZ(5px);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5);
        }
        .red-base { background: radial-gradient(circle at 30% 30%, #ff5c5c, #801a1a); }
        .blue-base { background: radial-gradient(circle at 30% 30%, #3399ff, #003366); }
        .yellow-base { background: radial-gradient(circle at 30% 30%, #ffe066, #997a00); }
        .green-base { background: radial-gradient(circle at 30% 30%, #47d147, #145214); }

        /* Realistic Pin Tokens */
        .token-3d {
            width: 28px;
            height: 28px;
            position: absolute;
            transform-style: preserve-3d;
            animation: tokenRise 1.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .token-body {
            position: absolute;
            width: 100%; height: 100%;
            background: inherit;
            border-radius: 50%;
            transform: translateZ(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .token-head {
            position: absolute;
            width: 60%; height: 60%;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            left: 20%; top: 20%;
            transform: translateZ(35px);
            box-shadow: inset 0 -4px 8px rgba(0,0,0,0.3);
        }

        @keyframes tokenRise {
            0% { transform: translateZ(-100px) scale(0.5); opacity: 0; }
            100% { transform: translateZ(15px) scale(1); opacity: 1; }
        }

        /* Enhanced Dice Surface */
        .dice-wrap {
            position: absolute;
            transform-style: preserve-3d;
            transform: translateZ(150px) rotateX(10deg);
            animation: diceDrop 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 2.5s;
            opacity: 0;
        }

        @keyframes diceDrop {
            0% { transform: translateZ(500px) rotateX(720deg) rotateY(720deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateZ(80px) rotateX(25deg) rotateY(15deg); opacity: 1; }
        }

        .dice-3d {
            width: 60px; height: 60px;
            position: relative;
            transform-style: preserve-3d;
            animation: diceSpin 3s linear infinite;
        }

        @keyframes diceSpin {
            0% { transform: rotateX(0) rotateY(0); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        .dice-face {
            position: absolute;
            width: 60px; height: 60px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            display: grid;
            grid-template: repeat(3, 1fr) / repeat(3, 1fr);
            padding: 8px;
            backface-visibility: visible;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
        }

        .dot { 
            background: #000; 
            border-radius: 50%; 
            width: 12px; height: 12px; 
            margin: auto;
            box-shadow: inset 0 2px 2px rgba(255,255,255,0.4);
        }

        .f-front  { transform: translateZ(30px); }
        .f-back   { transform: rotateY(180deg) translateZ(30px); }
        .f-right  { transform: rotateY(90deg) translateZ(30px); }
        .f-left   { transform: rotateY(-90deg) translateZ(30px); }
        .f-top    { transform: rotateX(90deg) translateZ(30px); }
        .f-bottom { transform: rotateX(-90deg) translateZ(30px); }

        /* UI Elements */
        .ui-panel {
            text-align: center;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 30px 60px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .game-title {
            font-size: 80px;
            font-weight: 950;
            letter-spacing: 12px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            opacity: 0;
            animation: textReveal 1s ease-out forwards 1s;
        }

        .status-msg {
            font-size: 11px;
            letter-spacing: 8px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 40px;
            font-weight: 900;
            opacity: 0;
            animation: textReveal 0.8s ease-out forwards 1.5s;
        }

        @keyframes textReveal {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .loader-track {
            width: 440px; height: 2px;
            background: rgba(255,255,255,0.05);
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .loader-fill {
            position: absolute;
            top: 0; left: 0; height: 100%;
            width: 0%;
            background: #fff;
            box-shadow: 0 0 20px #fff;
            transition: width 0.1s linear;
        }

        #countdown {
            position: fixed;
            top: 30px; right: 30px;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #555;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        /* Floating Particles */
        #particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="particles"></div>
    <div class="scanlines"></div>
    <div class="cinematic-bg"></div>
    <div class="cinematic-light"></div>
    <div id="countdown">SEC // 10</div>

    <div class="scene">
        <div class="board-container">
            <div class="ludo-grid">
                <!-- Base Colors -->
                <div class="base red-base">
                    <div class="token-3d" style="top:20%; left:20%; animation-delay: 2s; background: var(--red);"><div class="token-body"></div><div class="token-head"></div></div>
                    <div class="token-3d" style="top:20%; left:60%; animation-delay: 2.2s; background: var(--red);"><div class="token-body"></div><div class="token-head"></div></div>
                    <div class="token-3d" style="top:60%; left:20%; animation-delay: 2.1s; background: var(--red);"><div class="token-body"></div><div class="token-head"></div></div>
                    <div class="token-3d" style="top:60%; left:60%; animation-delay: 2.3s; background: var(--red);"><div class="token-body"></div><div class="token-head"></div></div>
                </div>
                <div class="base blue-base">
                    <div class="token-3d" style="top:20%; left:20%; animation-delay: 2.5s; background: var(--blue);"><div class="token-body"></div><div class="token-head"></div></div>
                </div>
                <div class="base yellow-base">
                     <div class="token-3d" style="top:20%; left:20%; animation-delay: 2.8s; background: var(--yellow);"><div class="token-body"></div><div class="token-head"></div></div>
                </div>
                <div class="base green-base">
                     <div class="token-3d" style="top:20%; left:20%; animation-delay: 3s; background: var(--green);"><div class="token-body"></div><div class="token-head"></div></div>
                </div>
                
                <!-- Center -->
                <div style="grid-column: 7/10; grid-row: 7/10; background: #fff; transform: translateZ(5px); border: 2px solid #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></div>
            </div>

            <!-- Real 3D Dice -->
            <div class="dice-wrap">
                <div class="dice-3d">
                    <div class="dice-face f-front"><div class="dot" style="grid-area: 2/2;"></div></div>
                    <div class="dice-face f-back"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="dice-face f-right"><div class="dot"></div><div class="dot" style="grid-area: 2/2;"></div><div class="dot" style="grid-area: 3/3;"></div></div>
                    <div class="dice-face f-left" style="grid-template: repeat(2, 1fr) / repeat(2, 1fr); padding: 10px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="dice-face f-top"><div class="dot"></div><div class="dot" style="grid-column: 3/4; grid-row: 3/4;"></div></div>
                    <div class="dice-face f-bottom"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="ui-panel">
        <h1 class="game-title">LUDO REALM</h1>
        <div class="status-msg" id="st-msg">SÝSTÈM ÍNÍTÍÁLÍZATÍON...</div>
        <div class="loader-track">
            <div class="loader-fill" id="l-fill"></div>
        </div>
    </div>

    <script>
        // Particle System
        const pContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const p = document.createElement('div');
            p.style.cssText = `
                position: absolute;
                width: ${Math.random() * 3}px;
                height: ${Math.random() * 3}px;
                background: #fff;
                top: ${Math.random() * 100}%;
                left: ${Math.random() * 100}%;
                opacity: ${Math.random() * 0.5};
                border-radius: 50%;
                filter: blur(1px);
                animation: float ${5 + Math.random() * 10}s infinite ease-in-out;
            `;
            pContainer.appendChild(p);
        }

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes float {
                0%, 100% { transform: translateY(0) translateX(0); }
                50% { transform: translateY(-20px) translateX(10px); }
            }
        `;
        document.head.appendChild(style);

        const fill = document.getElementById('l-fill');
        const msg = document.getElementById('st-msg');
        const count = document.getElementById('countdown');
        
        const logs = [
            "CONNECTING TO GLOBAL NET...",
            "ACQUIRING TOKEN ASSETS...",
            "CALIBRATING 3D PHYSICS...",
            "RENDERING MAGIC WORLD...",
            "PREPARING ARENA...",
            "SÝNC COMPLÉTÉD"
        ];

        let p = 0;
        let t = 10;
        
        const cd = setInterval(() => {
            t--;
            count.textContent = `SEC // ${t}`;
            if (t <= 0) clearInterval(cd);
        }, 1000);

        const pr = setInterval(() => {
            p += 0.5;
            fill.style.width = p + '%';
            
            if (p === 15) msg.textContent = logs[0];
            if (p === 35) msg.textContent = logs[1];
            if (p === 55) msg.textContent = logs[2];
            if (p === 75) msg.textContent = logs[3];
            if (p === 90) msg.textContent = logs[4];
            
            if (p >= 100) {
                clearInterval(pr);
                msg.textContent = logs[5];
                finish();
            }
        }, 50); // 50ms * 200 = 10s

        function finish() {
            const flash = document.createElement('div');
            flash.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:200;opacity:0;transition:opacity 0.8s ease-in-out;';
            document.body.appendChild(flash);
            
            setTimeout(() => {
                flash.style.opacity = '1';
                setTimeout(() => {
                    window.location.href = 'ludo_game.html';
                }, 1000);
            }, 500);
        }
    </script>
</body>
</html>
