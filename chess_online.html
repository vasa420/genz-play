<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Master - Online Lobby</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --accent: #fff;
            --secondary: #333;
            --glow: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--accent);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bg-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, #111 0%, #000 100%),
                repeating-linear-gradient(transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px);
            z-index: 0;
        }

        .lobby-container {
            z-index: 10;
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.8s ease;
        }

        h1 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 15px;
            margin-bottom: 60px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .lobby-btn {
            background: none;
            border: none;
            color: #888;
            padding: 20px 40px;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 5px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-transform: uppercase;
            position: relative;
        }

        .lobby-btn:hover {
            color: var(--accent);
            transform: translateY(-2px);
            text-shadow: 2px 0 #FF0000, -2px 0 #00FFFF, 0 0 20px rgba(255,255,255,0.4);
            animation: glitch 0.3s ease infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(-2px, -1px); }
            60% { transform: translate(2px, 1px); }
            80% { transform: translate(2px, -1px); }
            100% { transform: translate(0); }
        }

        .back-link {
            margin-top: 40px;
            display: inline-block;
            color: #555;
            text-decoration: none;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--accent); }

        /* Premium Arena Modal System */
        #custom-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(25px) saturate(180%);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5000;
            animation: fadeIn 0.4s ease;
        }

        .custom-modal {
            background: linear-gradient(145deg, #0f0f0f, #050505);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 60px;
            border-radius: 35px;
            text-align: center;
            width: 450px;
            box-shadow: 
                0 50px 100px rgba(0,0,0,1),
                inset 0 1px 1px rgba(255,255,255,0.1),
                0 0 50px rgba(255,255,255,0.03);
            animation: modalPopUp 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }

        .custom-modal::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 60%);
            animation: modalGlowPulse 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes modalPopUp {
            from { transform: scale(0.9) translateY(40px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes modalGlowPulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        .modal-title {
            color: #444;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .modal-text {
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            line-height: 1.8;
            margin-bottom: 45px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .modal-input-container {
            display: none;
            margin-bottom: 45px;
            position: relative;
        }

        .modal-input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            padding: 18px 25px;
            border-radius: 15px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .modal-input:focus {
            border-color: #fff;
            background: #151515;
            box-shadow: 0 0 30px rgba(255,255,255,0.1), inset 0 2px 4px rgba(0,0,0,0.8);
            transform: scale(1.02);
        }

        .modal-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .modal-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px 45px;
            border-radius: 50px;
            font-weight: 900;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            font-size: 11px;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        .modal-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255,255,255,0.4);
        }

        .modal-btn.secondary {
            background: #000;
            color: #555;
            border: 1px solid #222;
        }

        .modal-btn.secondary:hover {
            color: #fff;
            border-color: #555;
            background: #111;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="bg-effect"></div>

    <div class="lobby-container">
        <div class="options-grid">
            <button class="lobby-btn" onclick="joinRandom()">JOIN RANDOM ROOM</button>
            <button class="lobby-btn" onclick="createRoom()">CREATE ROOM</button>
            <button class="lobby-btn" onclick="joinWithId()">JOIN ROOM</button>
        </div>

        <a onclick="exitToArena()" class="back-link">← RETURN TO TRAINING</a>
    </div>

    <!-- Premium Arena Modal Overlay -->
    <div id="custom-modal-overlay">
        <div class="custom-modal">
            <div class="modal-title" id="modal-title-tag">SYSTEM NOTICE</div>
            <div class="modal-text" id="modal-content">ARENA NOTIFICATION</div>
            <div class="modal-input-container" id="modal-input-box">
                <input type="text" class="modal-input" id="modal-input-field" maxlength="4" placeholder="____" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>
            <div class="modal-controls">
                <button class="modal-btn secondary" id="modal-cancel-btn">CANCEL</button>
                <button class="modal-btn" id="modal-confirm-btn">PROCEED</button>
            </div>
        </div>
    </div>

    <script>
        function showArenaModal(options) {
            const { title = 'SYSTEM NOTICE', message, type = 'alert', onConfirm, onCancel, confirmText = 'PROCEED', cancelText = 'CANCEL' } = options;
            const content = document.getElementById('modal-content');
            const titleTag = document.getElementById('modal-title-tag');
            const inputContainer = document.getElementById('modal-input-box');
            const inputField = document.getElementById('modal-input-field');
            const confirmBtn = document.getElementById('modal-confirm-btn');
            const cancelBtn = document.getElementById('modal-cancel-btn');
            
            titleTag.innerText = title;
            content.innerText = message;
            inputContainer.style.display = type === 'prompt' ? 'block' : 'none';
            cancelBtn.style.display = (type === 'prompt' || type === 'confirm') ? 'block' : 'none';
            
            confirmBtn.innerText = confirmText;
            cancelBtn.innerText = cancelText;

            if (type === 'prompt') {
                inputField.value = "";
                setTimeout(() => inputField.focus(), 150);
            }
            
            confirmBtn.onclick = () => {
                const val = type === 'prompt' ? inputField.value : true;
                closeArenaModal();
                if (onConfirm) onConfirm(val);
            };
            
            cancelBtn.onclick = () => {
                closeArenaModal();
                if (onCancel) onCancel();
            };
            
            document.getElementById('custom-modal-overlay').style.display = 'flex';
        }

        function closeArenaModal() {
            document.getElementById('custom-modal-overlay').style.display = 'none';
        }

        function joinRandom() {
            showArenaModal({ message: "SEARCHING FOR OPPONENTS IN THE GRAND ARENA..." });
        }

        function createRoom() {
            const roomId = Math.floor(1000 + Math.random() * 9000);
            window.location.href = `chess_create_room.html?id=${roomId}&role=host`;
        }

        function joinWithId() {
            showArenaModal({
                title: "RECRUITMENT CODE",
                message: "ENTER 4-DIGIT ARENA ID",
                type: 'prompt',
                onConfirm: (id) => {
                    if (!id || id.length < 4) {
                        showArenaModal({
                            title: "ID ERROR",
                            message: "ROOM ID WILL BE 4 DIGIT NUMBER ONLY"
                        });
                    } else {
                        window.location.href = `chess_create_room.html?id=${id}&role=participant`;
                    }
                }
            });
        }
        function exitToArena() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage('closePortal', '*');
            } else {
                window.location.href = 'chess.html';
            }
        }
    </script>
</body>
</html>
