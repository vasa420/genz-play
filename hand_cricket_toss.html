<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Cricket - The Toss</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --accent: #fff;
            --neon-green: #00ffaa;
            --border: #113322;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: var(--accent);
            font-family: 'Outfit', sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        #bg-effect {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.9)), url('cricket_stadium_bg.png') no-repeat center center;
            background-size: cover; z-index: -1;
            animation: breatheBg 10s infinite alternate;
        }

        @keyframes breatheBg { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }

        .toss-container {
            z-index: 10; text-align: center;
            background: rgba(5, 10, 8, 0.85); border: 1px solid var(--neon-green);
            padding: 50px 80px; border-radius: 30px;
            box-shadow: 0 0 50px rgba(0,255,170,0.15);
            animation: dropIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes dropIn { from { transform: translateY(-50px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        .toss-title {
            font-size: 40px; font-weight: 950; color: var(--neon-green);
            letter-spacing: 5px; margin-bottom: 5px; text-shadow: 0 0 20px rgba(0,255,170,0.5);
        }
        
        .toss-sub { font-size: 14px; font-weight: 700; color: #888; letter-spacing: 2px; margin-bottom: 40px; }

        .coin-wrapper {
            margin: 40px auto; width: 150px; height: 150px;
            perspective: 1000px;
        }

        .coin {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .coin.flip-heads { transform: rotateY(1800deg); }
        .coin.flip-tails { transform: rotateY(1980deg); }

        .coin-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; font-weight: 900;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 0 30px rgba(0,255,170,0.5);
        }

        .heads { background: radial-gradient(#ffe066, #ffaa00); color: #553300; border: 5px solid #ffcc00;}
        .tails { background: radial-gradient(#eee, #aaa); color: #333; transform: rotateY(180deg); border: 5px solid #ccc;}

        .toss-btn-group { display: flex; gap: 20px; justify-content: center; }

        .toss-btn {
            background: #111; color: #fff; border: 1px solid #333;
            padding: 15px 40px; border-radius: 12px; font-size: 16px; font-weight: 900;
            cursor: pointer; transition: 0.3s; letter-spacing: 2px; font-family: inherit;
        }

        .toss-btn:hover { background: var(--neon-green); color: #000; border-color: var(--neon-green); box-shadow: 0 0 20px rgba(0,255,170,0.5); transform: scale(1.05); }

    </style>
</head>
<body>
    <div id="bg-effect"></div>

    <div class="toss-container">
        <div class="toss-title">THE TOSS</div>
        <div class="toss-sub">CALL YOUR FATE</div>

        <div class="coin-wrapper">
            <div class="coin" id="coin">
                <div class="coin-face heads">HEADS</div>
                <div class="coin-face tails">TAILS</div>
            </div>
        </div>

        <div class="toss-btn-group" id="btn-group">
            <button class="toss-btn" onclick="executeToss('Heads')">HEADS</button>
            <button class="toss-btn" onclick="executeToss('Tails')">TAILS</button>
        </div>

        <div class="toss-btn-group" id="decision-group" style="display:none;">
            <button class="toss-btn" onclick="makeDecision('Batting')">CHOOSE BATTING</button>
            <button class="toss-btn" onclick="makeDecision('Bowling')">CHOOSE BOWLING</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let isHost = localStorage.getItem('hc_isHost') === 'true'; 
        let isBot = localStorage.getItem('hc_isBot') === 'true';
        const roomId = localStorage.getItem('hc_roomId') || 'HC-ACTIVE-MATCH';
        let iWonToss = false;

        window.onload = () => {
            const subLabel = document.querySelector('.toss-sub');
            if (!isHost) {
                document.getElementById('btn-group').style.display = 'none';
                subLabel.innerText = "WAITING FOR HOST TO CALL...";
            }

            // Persistence Recovery
            const savedOutcome = localStorage.getItem('hc_toss_outcome');
            const savedWinner = localStorage.getItem('hc_toss_winner');
            const savedChoice = localStorage.getItem('hc_toss_choice');

            if (savedOutcome && savedWinner) {
                console.log("Restoring toss state...");
                restoreTossState(savedChoice, savedOutcome, savedWinner);
            }

            // Refresh Lock
            window.onbeforeunload = function() {
                if (localStorage.getItem('hc_toss_outcome')) {
                    return "Toss in progress. Refreshing may cause synchronization issues. Continue?";
                }
            };

            try {
                socket = io();
                socket.on('connect', () => {
                    socket.emit('join_room', { 
                        roomId, 
                        playerName: localStorage.getItem('playerName') || 'Player', 
                        isCreating: isHost 
                    });
                });

                socket.on('hc_toss_spun', (data) => {
                    executeSyncedToss(data.choice, data.outcome, data.hostName);
                });

                socket.on('hc_toss_decided', (data) => {
                    // Clear persistence on transition
                    clearTossPersist();
                    const opponentDecision = data.decision;
                    const myAssignment = (opponentDecision === 'Batting') ? 'BOWLING' : 'BATTING';
                    
                    const tObj = document.querySelector('.toss-title');
                    const sObj = document.querySelector('.toss-sub');
                    
                    tObj.innerText = `OPPONENT CHOSE ${opponentDecision.toUpperCase()}!`;
                    sObj.innerText = `READY UP! YOU ARE ${myAssignment}...`;
                    
                    localStorage.setItem('hc_player_role', myAssignment.toLowerCase());
                    
                    setTimeout(() => {
                        window.location.href = 'hand_cricket_arena.html';
                    }, 3000);
                });
            } catch(e) {
                console.error("Socket Link Error:", e);
            }
        };

        function restoreTossState(choice, outcome, winner) {
            document.getElementById('btn-group').style.display = 'none';
            const coin = document.getElementById('coin');
            const tObj = document.querySelector('.toss-title');
            const sObj = document.querySelector('.toss-sub');

            // Set final coin position without spin animation
            coin.style.transition = 'none';
            if (outcome === 'Heads') coin.classList.add('flip-heads');
            else coin.classList.add('flip-tails');

            iWonToss = (winner === 'YOU');
            const resultText = iWonToss ? "YOU WON THE TOSS!" : "OPPONENT WON TOSS!";
            
            tObj.innerText = resultText;
            tObj.style.color = iWonToss ? "var(--neon-green)" : "#ff4d4d";
            tObj.style.textShadow = iWonToss ? "0 0 20px rgba(0,255,170,0.5)" : "0 0 20px rgba(255,77,77,0.5)";
            sObj.innerText = `COIN LANDED ON ${outcome.toUpperCase()}`;

            if (iWonToss) {
                document.getElementById('decision-group').style.display = 'flex';
            } else {
                if (isBot) triggerBotTossDecision();
            }
        }

        function clearTossPersist() {
            localStorage.removeItem('hc_toss_outcome');
            localStorage.removeItem('hc_toss_winner');
            localStorage.removeItem('hc_toss_choice');
        }

        function executeToss(choice) {
            if (!isHost) return; 

            document.getElementById('btn-group').style.display = 'none';
            const outcome = Math.random() > 0.5 ? 'Heads' : 'Tails';
            
            if (socket) {
                socket.emit('hc_toss_spin', { 
                    roomId, 
                    choice, 
                    outcome, 
                    hostName: localStorage.getItem('playerName') || 'HOST' 
                });
            }

            executeSyncedToss(choice, outcome, "YOU");
        }

        function executeSyncedToss(choice, outcome, callerName) {
            document.getElementById('btn-group').style.display = 'none';
            const coin = document.getElementById('coin');
            const tObj = document.querySelector('.toss-title');
            const sObj = document.querySelector('.toss-sub');

            if (!isHost) {
                const mySide = (choice === 'Heads') ? 'TAILS' : 'HEADS';
                sObj.innerText = `OPPONENT SELECTED ${choice.toUpperCase()} THEN YOU ARE ${mySide}!`;
            } else {
                sObj.innerText = `${callerName} CALLED ${choice.toUpperCase()}!`;
            }
            
            coin.classList.remove('flip-heads', 'flip-tails');
            void coin.offsetWidth; 
            if (outcome === 'Heads') coin.classList.add('flip-heads');
            else coin.classList.add('flip-tails');

            setTimeout(() => {
                const hostWon = (choice === outcome);
                iWonToss = (isHost && hostWon) || (!isHost && !hostWon);
                const resultText = iWonToss ? "YOU WON THE TOSS!" : "OPPONENT WON TOSS!";
                
                // Save state for persistence
                localStorage.setItem('hc_toss_outcome', outcome);
                localStorage.setItem('hc_toss_winner', iWonToss ? "YOU" : "OPPONENT");
                localStorage.setItem('hc_toss_choice', choice);

                tObj.innerText = resultText;
                tObj.style.color = iWonToss ? "var(--neon-green)" : "#ff4d4d";
                tObj.style.textShadow = iWonToss ? "0 0 20px rgba(0,255,170,0.5)" : "0 0 20px rgba(255,77,77,0.5)";
                sObj.innerText = `COIN LANDED ON ${outcome.toUpperCase()}`;

                setTimeout(() => {
                    if (iWonToss) {
                        tObj.innerText = "YOU WON THE TOSS!";
                        sObj.innerText = "DECIDE YOUR DESTINY...";
                        document.getElementById('decision-group').style.display = 'flex';
                    } else {
                        tObj.innerText = "OPPONENT WON TOSS!";
                        sObj.innerText = "WAITING FOR THEIR DECISION...";
                        
                        // AI BOT LOGIC: If the winner is a bot, make it decide
                        if (isBot && !iWonToss) {
                            triggerBotTossDecision();
                        }
                    }
                }, 2000);
            }, 3000);
        }

        function triggerBotTossDecision() {
            setTimeout(() => {
                const decision = Math.random() > 0.5 ? 'Batting' : 'Bowling';
                const tObj = document.querySelector('.toss-title');
                const sObj = document.querySelector('.toss-sub');

                tObj.innerText = `OPPONENT CHOSE ${decision.toUpperCase()}!`;
                sObj.innerText = "THEY ARE READY. PREPARING THE ARENA...";
                
                const myRole = (decision === 'Batting') ? 'bowling' : 'batting';
                localStorage.setItem('hc_player_role', myRole);

                setTimeout(() => {
                    window.location.href = 'hand_cricket_arena.html';
                }, 3000);
            }, 2000);
        }

        function makeDecision(decision) {
            if (!iWonToss) return;
            
            clearTossPersist();
            document.getElementById('decision-group').style.display = 'none';
            const tObj = document.querySelector('.toss-title');
            const sObj = document.querySelector('.toss-sub');
            
            tObj.innerText = `YOU CHOSE ${decision.toUpperCase()}!`;
            sObj.innerText = "PREPARING THE ARENA...";
            
            localStorage.setItem('hc_player_role', decision.toLowerCase());

            if (socket) {
                socket.emit('hc_toss_decision', { 
                    roomId, 
                    decision, 
                    winnerName: localStorage.getItem('playerName') || 'WINNER' 
                });
            }

            setTimeout(() => {
                window.location.href = 'hand_cricket_arena.html';
            }, 3000);
        }
    </script>
</body>
</html>
