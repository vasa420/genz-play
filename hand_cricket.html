<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Cricket | Premiere Arena</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;700;900&display=swap');

        :root {
            --primary: #adff2f;
            --bg: #030305;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #static-container {
            text-align: center;
            z-index: 10;
        }

        .title {
            font-size: 60px;
            font-weight: 950;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(173, 255, 47, 0.4);
        }

        .status {
            font-size: 14px;
            color: #888;
            letter-spacing: 5px;
            font-weight: 400;
            text-transform: uppercase;
        }

        .visual-assets {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 50px 0;
        }

        .asset {
            opacity: 0.6;
            filter: grayscale(0.5);
        }

        .stump-set {
            display: flex;
            gap: 12px;
        }

        .stump {
            width: 10px;
            height: 120px;
            background: #444;
            border-radius: 5px;
        }

        .bat-static {
            width: 30px;
            height: 140px;
            background: #444;
            border-radius: 4px 4px 10px 10px;
            position: relative;
        }

        .bat-static::before {
            content: '';
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 40px;
            background: #222;
        }

        .back-btn {
            margin-top: 40px;
            background: transparent;
            border: 1px solid #333;
            color: #666;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .back-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div id="static-container">
        <div class="title">HAND CRICKET</div>
        <div class="status">DEVELOPMENT IN PROGRESS</div>

        <div class="visual-assets">
            <div class="asset">
                <div class="stump-set">
                    <div class="stump"></div>
                    <div class="stump"></div>
                    <div class="stump"></div>
                </div>
            </div>
            <div class="asset">
                <div class="bat-static"></div>
            </div>
        </div>

        <button class="back-btn" onclick="window.location.href='index.html'">RETURN TO HUB</button>
    </div>

    <script>
        // Optional quick redirect after 10s if they don't click anything
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 10000);
    </script>
</body>

</html>
