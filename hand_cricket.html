<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Cricket | Preparing Match</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #87CEEB; /* Sky blue base */
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #sky-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #fff 0%, #87CEEB 70%);
            z-index: 1;
        }

        .sun-rays {
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-conic-gradient(from 0deg, rgba(255,255,255,0.2) 0deg 10deg, transparent 10deg 20deg);
            animation: rotateRays 30s linear infinite;
            z-index: 2;
        }

        @keyframes rotateRays {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .clouds {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/clouds.png');
            opacity: 0.5;
            z-index: 3;
            animation: moveClouds 60s linear infinite;
        }

        @keyframes moveClouds {
            from { background-position: 0 0; }
            to { background-position: 1000px 0; }
        }

        /* ---- The Hand and Ball ---- */
        .hand-wrapper {
            position: relative;
            z-index: 10;
            transform: translateY(100px);
            animation: handRise 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes handRise {
            to { transform: translateY(0); }
        }

        .arm {
            width: 40px;
            height: 300px;
            background: linear-gradient(to right, #e0ac69, #ffdbac, #e0ac69);
            margin: 0 auto;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .cricket-ball {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000);
            border-radius: 50%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset -10px -10px 20px rgba(0,0,0,0.4);
            z-index: 11;
            animation: ballSpin 3s linear infinite;
        }

        .ball-seam {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-top: 1px solid rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(0,0,0,0.2);
        }

        @keyframes ballSpin {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        .fingers {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 100px;
            z-index: 12;
            display: flex;
            justify-content: space-around;
            padding: 0 5px;
        }

        .finger {
            width: 18px;
            height: 60px;
            background: #ffdbac;
            border-radius: 10px;
            border-bottom: 2px solid #e0ac69;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        /* Intro Text */
        .overlay-text {
            position: absolute;
            bottom: 60px;
            text-align: center;
            width: 100%;
            z-index: 20;
        }

        .title {
            font-size: 48px;
            font-weight: 950;
            color: #fff;
            letter-spacing: 10px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        .sub-text {
            color: rgba(255,255,255,0.8);
            letter-spacing: 4px;
            font-size: 14px;
            margin-top: 10px;
            font-weight: 400;
        }

        /* Transition Effect */
        .white-flash {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        .animate-flash {
            animation: flashOut 1.5s forwards;
        }

        @keyframes flashOut {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

    </style>
</head>

<body>
    <div id="sky-bg">
        <div class="sun-rays"></div>
        <div class="clouds"></div>
    </div>

    <div class="hand-wrapper">
        <div class="arm">
            <div class="cricket-ball">
                <div class="ball-seam"></div>
            </div>
            <div class="fingers">
                <div class="finger" style="height: 70px; transform: rotate(-5deg);"></div>
                <div class="finger" style="height: 80px; transform: rotate(0deg);"></div>
                <div class="finger" style="height: 75px; transform: rotate(5deg);"></div>
            </div>
        </div>
    </div>

    <div class="overlay-text">
        <div class="title">HAND CRICKET</div>
        <div class="sub-text">PREPARING DIGITAL PITCH...</div>
    </div>

    <div class="white-flash" id="flash"></div>

    <script>
        // Redirect logic
        setTimeout(() => {
            document.getElementById('flash').classList.add('animate-flash');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 750);
        }, 3000); // 3 seconds intro as requested
    </script>
</body>

</html>
