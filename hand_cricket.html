<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Cricket | Main Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39FF14;
            --neon-blue: #00FFFF;
            --neon-red: #FF3B30;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Abstract Background Elements */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
            animation: float 15s infinite alternate ease-in-out;
        }

        .glow-1 { top: -10%; left: -10%; background: var(--neon-blue); }
        .glow-2 { bottom: -10%; right: -10%; background: var(--neon-green); animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Header */
        header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-area div {
            font-size: 35px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 950;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .player-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-info {
            text-align: right;
        }

        .player-name {
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 1px;
            color: var(--neon-green);
        }
        
        .player-status {
            font-size: 11px;
            color: #888;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            background: #222;
        }

        /* Main Game Arena */
        .arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            padding: 20px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            margin-top: 60px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 800px;
        }

        .score-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 30px;
            width: 250px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .score-card.active {
            border-color: var(--neon-green);
            box-shadow: 0 10px 40px rgba(57, 255, 20, 0.15);
            transform: translateY(-5px);
        }

        .score-title {
            font-size: 14px;
            color: #aaa;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .score-value {
            font-size: 60px;
            font-weight: 950;
            line-height: 1;
            margin-bottom: 5px;
        }

        .score-status {
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--neon-blue);
        }

        .vs-badge {
            font-size: 24px;
            font-weight: 950;
            color: #555;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 50%;
            border: 1px solid #333;
        }

        /* Game Display Area */
        .match-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            margin-bottom: 50px;
            height: 150px;
        }

        .hand-number {
            font-size: 100px;
            font-weight: 950;
            color: rgba(255,255,255,0.1);
            text-shadow: 0 0 20px rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hand-number.show {
            color: #fff;
            text-shadow: 0 0 40px var(--neon-blue);
            transform: scale(1.2);
        }

        .commentary {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--neon-green);
            text-transform: uppercase;
            background: rgba(0,0,0,0.8);
            padding: 10px 30px;
            border-radius: 50px;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .commentary.flash {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1);
            animation: flashText 0.5s ease-out forwards;
        }

        @keyframes flashText {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .red-flash { color: var(--neon-red); border-color: var(--neon-red); box-shadow: 0 0 30px rgba(255, 59, 48, 0.2); }

        /* Controls */
        .controls-container {
            width: 100%;
            max-width: 600px;
            background: rgba(0,0,0,0.4);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(15px);
        }

        .controls-title {
            text-align: center;
            font-size: 11px;
            letter-spacing: 3px;
            color: #888;
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.15) !important;
            transform: translateX(5px);
            border-color: rgba(255,255,255,0.3) !important;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .run-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            height: 70px;
            border-radius: 15px;
            font-size: 28px;
            font-weight: 950;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .run-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .run-btn:active {
            transform: scale(0.95);
            background: #fff;
            color: #000;
            text-shadow: none;
        }
        
        .run-btn.disabled {
            opacity: 0.5;
            background: rgba(255,255,255,0.05); /* slightly dimmer background */
            color: #888; /* gray out text instead of making it fully invisible */
            border-color: rgba(255,255,255,0.05);
            pointer-events: none;
            text-shadow: none;
        }

        .action-row {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .restart-btn {
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 12px 30px;
            border-radius: 30px;
            font-family: inherit;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            display: none;
        }

        .restart-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

    </style>
</head>
<body>

    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>


    <div class="main-layout" style="display: flex; flex: 1; width: 100%; overflow: hidden;">
        <div class="arena">
        
        <div style="align-self: flex-start; margin-left: 15px; margin-bottom: 30px; z-index: 100; font-size: 18px; font-weight: 950; letter-spacing: 3px; text-transform: uppercase; display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 24px;">🏏</span> 
            <span style="background: linear-gradient(90deg, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">HAND CRICKET</span>
        </div>
        
        <div class="score-board">
            <div class="score-card active" id="player-card">
                <div class="score-title" id="player-role">BATTING</div>
                <div class="score-value" id="player-score">0</div>
                <div class="score-status" id="player-status">TARGET: -</div>
            </div>

            <div class="vs-badge">VS</div>

            <div class="score-card" id="computer-card">
                <div class="score-title" id="computer-role">BOWLING</div>
                <div class="score-value" id="computer-score">0</div>
                <div class="score-status" id="computer-status">BOT</div>
            </div>
        </div>

        <div class="match-display">
            <div class="hand-number" id="player-hand">?</div>
            <div class="hand-number" id="computer-hand">?</div>
            <div class="commentary" id="commentary">MATCH START</div>
        </div>

        <div class="controls-container">
            <div class="controls-title">Select your move</div>
            <div class="btn-grid" id="controls">
                <button class="run-btn" onclick="playHand(1)">1</button>
                <button class="run-btn" onclick="playHand(2)">2</button>
                <button class="run-btn" onclick="playHand(3)">3</button>
                <button class="run-btn" onclick="playHand(4)">4</button>
                <button class="run-btn" onclick="playHand(5)">5</button>
                <button class="run-btn" onclick="playHand(6)">6</button>
                <button class="run-btn" onclick="playHand(7)">7</button>
                <button class="run-btn" onclick="playHand(8)">8</button>
                <button class="run-btn" onclick="playHand(9)">9</button>
                <button class="run-btn" onclick="playHand(10)">10</button>
            </div>
            <div class="action-row">
                <button class="restart-btn" id="restart-btn" onclick="initGame()">PLAY AGAIN</button>
            </div>
        </div>

    </div>
        
        <!-- Side Navigation on Right -->
        <aside class="sidebar" style="width: 260px; flex-shrink: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); border-left: 1px solid var(--border-glass); padding: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 50; overflow-y: auto;">
            <div style="font-size: 11px; letter-spacing: 3px; color: #888; font-weight: 900; margin-bottom: 20px;">LOBBY MAIN</div>
            
            <button class="nav-btn" onclick="window.location.href='hand_cricket_room.html'" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 700; text-align: left; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 20px;">🎮</span> Create Match
            </button>
            <button class="nav-btn" onclick="openJoinModal()" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 700; text-align: left; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 20px;">🔑</span> Join Room
            </button>
            <button class="nav-btn" onclick="showCustomAlert('COLLECTION', 'Avatar and skin collection is currently locked! Keep playing to unlock it.')" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 700; text-align: left; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 20px;">🎒</span> Collection
            </button>
            <button class="nav-btn" onclick="initGame()" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 700; text-align: left; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 20px;">🔄</span> Reset Match
            </button>
            
            <div style="flex:1;"></div>
            
            <!-- Music Toggle Button -->
            <button id="music-toggle" onclick="toggleMusic()" class="nav-btn" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; font-family: inherit; font-size: 12px; font-weight: 900; text-align: left; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
                <span style="font-size: 18px;">🔊</span> MUSIC: ON
            </button>
            
            <button onclick="window.location.href='index.html'" style="background: rgba(255, 59, 48, 0.2); color: var(--neon-red); border: 1px solid var(--neon-red); padding: 15px; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s;">
                OTHER GAMES
            </button>
        </aside>
    </div> <!-- Close main-layout -->

    <!-- Looping Background Music -->
    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3" loop preload="auto"></audio>

    <!-- Custom Alert Modal UI -->
    <div id="custom-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;">
        <div style="background: rgba(15,15,15,0.95); border: 1px solid var(--border-glass); padding: 35px; border-radius: 16px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 0 30px rgba(0, 255, 170, 0.1); transform: translateY(20px); transition: transform 0.3s ease;" id="modal-box">
            <div id="modal-title" style="font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 15px; letter-spacing: 2px;">NOTICE</div>
            <div id="modal-message" style="font-size: 14px; color: #bbb; margin-bottom: 25px; line-height: 1.6;">Message goes here</div>
            <button onclick="closeCustomAlert()" style="background: var(--neon-green); color: #000; padding: 12px 30px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; transition: transform 0.2s, background 0.2s; width: 100%;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                GOT IT
            </button>
        </div>
    </div>

    <!-- Join Room Modal UI -->
    <div id="join-room-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1100; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; padding: 20px;">
        <div style="background: #080808; border: 2px solid var(--neon-blue); padding: 40px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);">
            <div style="font-size: 50px; margin-bottom: 20px;">🔐</div>
            <h2 style="font-size: 22px; font-weight: 950; color: #fff; margin-bottom: 5px; letter-spacing: 2px;">JOIN PRIVATE ROOM</h2>
            <p style="font-size: 11px; color: #888; font-weight: 900; letter-spacing: 2px; margin-bottom: 30px;">ENTER THE 6-DIGIT ARENA CODE</p>
            
            <input type="text" id="join-room-id" maxlength="6" placeholder="000000" style="background: #000; border: 1px solid #333; border-radius: 12px; padding: 15px; width: 100%; font-family: inherit; font-size: 24px; font-weight: 950; color: var(--neon-blue); text-align: center; letter-spacing: 8px; outline: none; margin-bottom: 30px; box-sizing: border-box; transition: 0.3s;" onfocus="this.style.borderColor='var(--neon-blue)'" onblur="this.style.borderColor='#333'">
            
            <div style="display: flex; gap: 15px;">
                <button onclick="closeJoinModal()" style="flex:1; background: #1a1a1a; color: #888; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 11px; letter-spacing: 2px;">CANCEL</button>
                <button onclick="confirmJoin()" style="flex:2; background: var(--neon-blue); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 950; cursor: pointer; transition: 0.3s; font-size: 11px; letter-spacing: 2px;">JOIN MATCH</button>
            </div>
        </div>
    </div>

    <script>
        // Custom Modal Logic
        function showCustomAlert(title, message) {
            const modal = document.getElementById('custom-modal');
            const box = document.getElementById('modal-box');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            
            modal.style.display = 'flex';
            // Trigger reflow to ensure transitions run
            void modal.offsetWidth;
            modal.style.opacity = '1';
            box.style.transform = 'translateY(0)';
        }

        function closeCustomAlert() {
            const modal = document.getElementById('custom-modal');
            const box = document.getElementById('modal-box');
            
            modal.style.opacity = '0';
            box.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }

        // Join Room Functions
        function openJoinModal() {
            const modal = document.getElementById('join-room-modal');
            modal.style.display = 'flex';
            setTimeout(() => { 
                modal.style.opacity = '1'; 
                document.getElementById('join-room-id').focus();
            }, 10);
        }

        function closeJoinModal() {
            const modal = document.getElementById('join-room-modal');
            modal.style.opacity = '0';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }

        function confirmJoin() {
            const code = document.getElementById('join-room-id').value.trim();
            if (code.length < 6) {
                showCustomAlert("INVALID CODE", "Please enter a valid 6-digit room ID to proceed.");
                return;
            }
            
            // Setup session for joining
            localStorage.setItem('hc_roomId', code);
            localStorage.setItem('hc_isHost', 'false');
            
            // Redirect to toss (assuming joining takes you straight to match prep)
            window.location.href = 'hand_cricket_toss.html';
        }

        // User Setup
        window.onload = () => {
            const name = localStorage.getItem('playerName');
            const avatar = localStorage.getItem('playerAvatar');
            if (name) document.getElementById('display-name').innerText = name.toUpperCase();
            if (avatar) document.getElementById('display-avatar').src = avatar;
            
            initGame();

            // Attempt to autoplay music (browsers might block it until interaction)
            const bgMusic = document.getElementById('bg-music');
            bgMusic.volume = 0.4;
            bgMusic.play().catch(e => {
                console.log("Autoplay blocked, waiting for user click.");
                // Add one-time click listener to start music if autoplay fails
                document.body.addEventListener('click', forcePlayMusic, { once: true });
            });
        };

        function forcePlayMusic() {
            if(!isMusicMuted) {
                document.getElementById('bg-music').play().catch(e=>console.log(e));
            }
        }

        let isMusicMuted = false;
        function toggleMusic() {
            const bgMusic = document.getElementById('bg-music');
            const btn = document.getElementById('music-toggle');
            isMusicMuted = !isMusicMuted;
            if (isMusicMuted) {
                bgMusic.pause();
                btn.innerHTML = '<span style="font-size: 18px;">🔈</span> MUSIC: OFF';
            } else {
                bgMusic.play().catch(e=>console.log());
                btn.innerHTML = '<span style="font-size: 18px;">🔊</span> MUSIC: ON';
            }
        }

        // Game State
        let state = {
            playerScore: 0,
            computerScore: 0,
            target: null,
            innings: 1, // 1: Player batting, 2: Computer batting
            isGameOver: false
        };

        const DOM = {
            pScore: document.getElementById('player-score'),
            cScore: document.getElementById('computer-score'),
            pHand: document.getElementById('player-hand'),
            cHand: document.getElementById('computer-hand'),
            pRole: document.getElementById('player-role'),
            cRole: document.getElementById('computer-role'),
            pStatus: document.getElementById('player-status'),
            pCard: document.getElementById('player-card'),
            cCard: document.getElementById('computer-card'),
            comm: document.getElementById('commentary'),
            btns: document.querySelectorAll('.run-btn'),
            restart: document.getElementById('restart-btn')
        };

        function initGame() {
            state = {
                playerScore: 0,
                computerScore: 0,
                target: null,
                innings: 1,
                isGameOver: false
            };
            
            DOM.pScore.innerText = "0";
            DOM.cScore.innerText = "0";
            DOM.pHand.innerText = "?";
            DOM.cHand.innerText = "?";
            DOM.pStatus.innerText = "TARGET: -";
            
            DOM.pHand.classList.remove('show');
            DOM.cHand.classList.remove('show');
            
            setRoles(1); // Player bats first
            
            DOM.btns.forEach(btn => btn.classList.remove('disabled'));
            DOM.restart.style.display = 'none';
            showComm("PLAY!", false);
        }

        function setRoles(innings) {
            if (innings === 1) {
                DOM.pRole.innerText = "BATTING";
                DOM.cRole.innerText = "BOWLING";
                DOM.pCard.classList.add('active');
                DOM.cCard.classList.remove('active');
            } else {
                DOM.pRole.innerText = "BOWLING";
                DOM.cRole.innerText = "BATTING";
                DOM.pCard.classList.remove('active');
                DOM.cCard.classList.add('active');
            }
        }

        function showComm(msg, isRed = false) {
            DOM.comm.innerText = msg;
            DOM.comm.className = "commentary";
            if(isRed) DOM.comm.classList.add('red-flash');
            
            // Trigger reflow to restart animation
            void DOM.comm.offsetWidth; 
            DOM.comm.classList.add('flash');
            
            setTimeout(() => {
                DOM.comm.classList.remove('flash');
            }, 1500);
        }

        function playHand(playerNum) {
            if (state.isGameOver) return;

            // Simple bot logic (1-10)
            const computerNum = Math.floor(Math.random() * 10) + 1;

            // Animate Hands
            DOM.pHand.innerText = playerNum;
            DOM.cHand.innerText = computerNum;
            DOM.pHand.classList.add('show');
            DOM.cHand.classList.add('show');
            
            // Temporary bounce effect
            DOM.pHand.style.transform = 'scale(1.4)';
            DOM.cHand.style.transform = 'scale(1.4)';
            setTimeout(() => {
                DOM.pHand.style.transform = 'scale(1.2)';
                DOM.cHand.style.transform = 'scale(1.2)';
            }, 150);

            // Logic
            if (playerNum === computerNum) {
                // OUT!
                showComm("OUT!", true);
                handleOut();
            } else {
                // RUNS!
                if (state.innings === 1) {
                    state.playerScore += playerNum;
                    DOM.pScore.innerText = state.playerScore;
                    showComm("+" + playerNum + " RUNS");
                } else {
                    state.computerScore += computerNum;
                    DOM.cScore.innerText = state.computerScore;
                    showComm("BOT: +" + computerNum);
                }
                checkWin();
            }
        }

        function handleOut() {
            if (state.innings === 1) {
                // Player goes out, switch to inning 2
                state.innings = 2;
                state.target = state.playerScore + 1;
                DOM.pStatus.innerText = "FINAL SCORE: " + state.playerScore;
                
                setTimeout(() => {
                    showComm("TARGET: " + state.target);
                    setRoles(2);
                }, 1500);
            } else {
                // Computer goes out, player wins
                endGame("YOU WIN!");
            }
        }

        function checkWin() {
            if (state.innings === 2 && state.target) {
                if (state.computerScore >= state.target) {
                    endGame("BOT WINS :(");
                }
            }
        }

        function endGame(resultStr) {
            state.isGameOver = true;
            setTimeout(() => {
                showComm(resultStr, resultStr.includes("BOT"));
                DOM.btns.forEach(btn => btn.classList.add('disabled'));
                DOM.restart.style.display = 'block';
            }, 1000);
        }

    </script>
</body>
</html>
