<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Realm - Tactical Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --jungle: #00ff88;
            --sidebar: #111;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex; overflow: hidden;
        }

        .sidebar {
            width: 320px; height: 100vh; background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 30px; box-sizing: border-box; display: flex; flex-direction: column;
        }

        .main-arena {
            flex-grow: 1; height: 100vh; position: relative;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #0a1f1a 0%, #000 100%);
        }

        .game-status {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            padding: 10px 30px; background: rgba(0,0,0,0.5); border: 1px solid var(--jungle);
            border-radius: 100px; font-weight: 950; font-size: 12px; letter-spacing: 2px;
            color: var(--jungle); backdrop-filter: blur(10px);
        }

        .snake-board {
            width: 600px; height: 600px; background: #000;
            border: 15px solid #111; display: grid;
            grid-template: repeat(10, 1fr) / repeat(10, 1fr);
            box-shadow: 0 0 100px rgba(0,255,136,0.1);
            position: relative;
        }

        .cell {
            border: 1px solid rgba(255,255,255,0.02);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 900; color: #333;
        }

        .cell:nth-child(even) { background: rgba(255,255,255,0.01); }

        .btn-hub {
            position: absolute; top: 40px; right: 40px;
            background: #111; border: 1px solid #333; color: #fff;
            padding: 12px 25px; border-radius: 10px; font-weight: 950;
            font-size: 12px; cursor: pointer; transition: 0.3s;
        }
        .btn-hub:hover { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="font-weight: 950; letter-spacing: 2px;">SNAKE REALM</h2>
        <p style="font-size: 11px; color: #555; margin-bottom: 30px;">TACTICAL VERTICALITY</p>
        
        <div style="flex-grow: 1;">
             <div style="font-size: 10px; color: #333; font-weight: 900; letter-spacing: 2px;">ARENA STATUS: ACTIVE</div>
        </div>

        <button onclick="window.location.href='index.html'" style="background: transparent; color: #555; border: 1px solid #222; padding: 15px; border-radius: 12px; font-family: inherit; font-weight: 950; cursor: pointer;">EXIT ARENA</button>
    </div>

    <div class="main-arena">
        <div class="game-status">ARENA SYNCHRONIZED. READY FOR CLIMB.</div>
        <button class="btn-hub" onclick="alert('OPENING GAME HUB...')">MORE GAMES</button>

        <div class="snake-board" id="board">
            <!-- 10x10 grid -->
        </div>
    </div>

    <script>
        const board = document.getElementById('board');
        let count = 100;
        for (let row = 0; row < 10; row++) {
            let rowCells = [];
            for (let col = 0; col < 10; col++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = count--;
                rowCells.push(cell);
            }
            // Snake and ladder grid zigzag logic
            if (row % 2 !== 0) rowCells.reverse();
            rowCells.forEach(c => board.appendChild(c));
        }
    </script>
</body>
</html>
