<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake & Ladder - tactical Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030a08;
            --jungle-green: #00ff88;
            --gold: #ffcc00;
            --snake-red: #ff3333;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Cinematic Video Background */
        .video-background {
            position: absolute;
            inset: 0;
            z-index: -2;
            overflow: hidden;
            background: #000;
        }

        .video-background video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            filter: brightness(0.6) contrast(1.1);
        }

        /* 3D Board Visualization */
        .scene {
            perspective: 2500px;
            width: 450px;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .board-wrap {
            width: 400px;
            height: 400px;
            transform-style: preserve-3d;
            transform: rotateX(65deg) rotateZ(45deg);
        }

        .grid-10x10 {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template: repeat(10, 1fr) / repeat(10, 1fr);
            background: rgba(0, 255, 136, 0.05);
            border: 12px solid #111;
            box-shadow: 0 0 100px rgba(0, 255, 136, 0.1), inset 0 0 50px rgba(0, 0, 0, 1);
        }

        .cell {
            border: 1px solid rgba(0, 255, 136, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
        }

        /* Animated Snakes & Ladders */
        .ladder {
            position: absolute;
            width: 40px;
            height: 200px;
            background: repeating-linear-gradient(0deg, #555 0px, #555 5px, transparent 5px, transparent 20px);
            border-left: 4px solid var(--gold);
            border-right: 4px solid var(--gold);
            transform: translateZ(20px) rotateZ(-10deg);
        }

        .snake {
            position: absolute;
            width: 10px;
            height: 180px;
            background: linear-gradient(to bottom, var(--snake-red), #500);
            border-radius: 50px;
            filter: blur(2px);
            transform: translateZ(10px) rotateZ(20deg);
        }

        /* UI Panel */
        .ui-panel {
            margin-top: 50px;
            text-align: center;
            z-index: 100;
        }

        .title {
            font-size: 70px;
            font-weight: 950;
            letter-spacing: 10px;
            background: linear-gradient(to bottom, #fff, var(--jungle-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .status {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 5px;
            color: var(--jungle-green);
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--jungle-green);
        }

        .btn-hub {
            position: fixed; top: 40px; right: 40px;
            background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff;
            padding: 14px 28px; border-radius: 12px; font-weight: 950;
            font-size: 11px; cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(10px); letter-spacing: 1px;
        }
        .btn-hub:hover { background: #fff; color: #000; }

    </style>
</head>

<body>
    <div class="video-background">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="https://cdn.jsdelivr.net/gh/vasa420/genz-play/Snake_and_Ladder_Video_Intro.mp4" type="video/mp4">
        </video>
    </div>

    <button class="btn-hub" onclick="window.location.href='index.html'">EXIT ARENA</button>

    <div class="scene">
        <div class="board-wrap">
            <div class="grid-10x10">
                <!-- 100 cells generated via JS -->
            </div>
            <!-- Decorative Elements -->
            <div class="ladder" style="top: 10%; left: 20%;"></div>
            <div class="ladder" style="top: 40%; left: 70%; height: 150px; transform: rotate(15deg);"></div>
            <div class="snake" style="top: 20%; left: 50%;"></div>
            <div class="snake" style="top: 60%; left: 10%; height: 100px;"></div>
        </div>
    </div>

    <div class="ui-panel">
        <div class="title">SNAKE REALM</div>
        <div class="status" id="status-txt">READY FOR TACTICAL ASCENT</div>
    </div>

    <audio id="intro-music" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-tribal-rhythm-2-411.mp3" type="audio/mpeg">
    </audio>

    <script>
        const grid = document.querySelector('.grid-10x10');
        for (let i = 100; i >= 1; i--) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.textContent = i;
            grid.appendChild(cell);
        }

        const music = document.getElementById('intro-music');

        // Start music and video on first click
        window.addEventListener('click', () => {
            if (music.paused) music.play();
            const video = document.getElementById('bg-video');
            if (video && video.paused) video.play();
        }, { once: true });

    </script>
</body>

</html>
